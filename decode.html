<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>📚 错题本解码</title>
<style>
body {
    font-family: "Segoe UI", sans-serif;
    padding: 20px;
    line-height: 1.8;
    white-space: pre-wrap; /* ⭐ 保留换行 */
}
textarea {
    width: 100%;
    height: 300px;
    font-size: 16px;
    padding: 10px;
    white-space: pre-wrap;
}
</style>
</head>
<body>

<h2>📚 错题本内容</h2>
<textarea id="output"></textarea>

<script>
// 从 URL 获取 Base64
const base64 = decodeURIComponent(location.search.replace('?data=', ''));

// Base64 → 原始文本（含换行）
const text = decodeURIComponent(escape(atob(base64)));

// 显示到页面
document.getElementById('output').value = text;
</script>

</body>
</html>
