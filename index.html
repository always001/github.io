<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>点对点网页聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #f5f5f5; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #2d8cf0; color: white; padding: 15px; text-align: center; }
        .room-id { background: #fff; padding: 10px; text-align: center; border-bottom: 1px solid #eee; }
        .chat-area { flex: 1; padding: 15px; overflow-y: auto; }
        .msg { margin: 10px 0; max-width: 75%; }
        .self { text-align: right; margin-left: auto; }
        .other { text-align: left; }
        .msg-bubble { display: inline-block; padding: 8px 12px; border-radius: 10px; background: #e9e9eb; word-break: break-all; }
        .self .msg-bubble { background: #2d8cf0; color: white; }
        .input-area { display: flex; padding: 10px; background: #fff; border-top: 1px solid #eee; }
        #msgInput { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        #sendBtn { margin-left: 8px; padding: 0 15px; border: none; background: #2d8cf0; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">P2P 点对点聊天</div>
    <div class="room-id">
        你的房间ID：<span id="myId">连接中...</span>
        <br>
        <small>把你的ID发给朋友，让他输入并连接你</small>
        <br>
        <input type="text" id="peerId" placeholder="输入朋友的ID">
        <button id="connectBtn">连接</button>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="输入消息...">
        <button id="sendBtn">发送</button>
    </div>

    <script src="https://unpkg.com/peerjs@1.3.2/dist/peerjs.min.js"></script>
    <script>
        const chatArea = document.getElementById('chatArea');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const myIdEl = document.getElementById('myId');
        const peerIdInput = document.getElementById('peerId');
        const connectBtn = document.getElementById('connectBtn');

        // 初始化PeerJS
        const peer = new Peer();
        let conn;

        // 显示自己的ID
        peer.on('open', id => {
            myIdEl.textContent = id;
        });

        // 接收连接
        peer.on('connection', connection => {
            conn = connection;
            initConn();
            addSystemMsg("朋友已连接！");
        });

        // 主动连接朋友
        connectBtn.addEventListener('click', () => {
            const targetId = peerIdInput.value.trim();
            if (!targetId) return;
            conn = peer.connect(targetId);
            initConn();
        });

        // 初始化连接事件
        function initConn() {
            conn.on('open', () => {
                addSystemMsg("连接成功！可以开始聊天了");
            });
            conn.on('data', data => {
                addMsg(data, false);
            });
            conn.on('close', () => {
                addSystemMsg("连接已断开");
            });
        }

        // 发送消息
        function sendMsg() {
            const text = msgInput.value.trim();
            //暂时解开限制，可以自己给自己发信
            //if (!text || !conn || !conn.open) return;
            if (!text) return;
            conn.send(text);
            addMsg(text, true);
            msgInput.value = '';
        }

        // 添加消息到界面
        function addMsg(text, isSelf) {
            const div = document.createElement('div');
            div.className = `msg ${isSelf ? 'self' : 'other'}`;
            div.innerHTML = `<div class="msg-bubble">${text}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 添加系统消息
        function addSystemMsg(text) {
            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.color = '#888';
            div.style.fontSize = '12px';
            div.style.margin = '10px 0';
            div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMsg);
        msgInput.addEventListener('keydown', e => e.key === 'Enter' && sendMsg());
    </script>
</body>
</html>
