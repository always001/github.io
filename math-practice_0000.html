<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 小学1年级 算数练习</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ffeaa7 0%, #fab1a0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .top-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .icon-btn {
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            position: relative;
        }
        
        .icon-btn:hover { transform: scale(1.1); }
        .icon-btn.muted { opacity: 0.5; }
        
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #d63031;
            color: white;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            padding: 0 5px;
        }
        
        .badge:empty { display: none; }
        
        .container {
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 650px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #e17055;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #636e72;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .settings {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        
        .setting-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .setting-row label {
            font-weight: bold;
            color: #2d3436;
            min-width: 80px;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn-option {
            padding: 8px 16px;
            border: 2px solid #74b9ff;
            background: white;
            color: #74b9ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-option:hover { background: #74b9ff; color: white; }
        .btn-option.active { background: #74b9ff; color: white; }
        
        input[type="number"], input[type="email"], input[type="text"] {
            padding: 8px 12px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            font-size: 14px;
        }
        
        input[type="number"] { width: 80px; }
        input[type="email"] { width: 200px; }
        input[type="text"] { width: 150px; }
        
        .menu-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .question-area {
            text-align: center;
            margin: 30px 0;
            min-height: 200px;
        }
        
        .question-number {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .question-text {
            font-size: 48px;
            font-weight: bold;
            color: #2d3436;
            margin: 20px 0;
            letter-spacing: 5px;
        }
        
        .question-text .answer-input {
            font-size: 48px;
            font-weight: bold;
            width: 100px;
            text-align: center;
            border: none;
            border-bottom: 4px solid #e17055;
            outline: none;
            color: #e17055;
        }
        
        .feedback {
            font-size: 20px;
            margin: 15px 0;
            min-height: 30px;
        }
        
        .feedback.correct {
            color: #00b894;
            animation: bounce 0.5s;
        }
        
        .feedback.wrong {
            color: #d63031;
            animation: shake 0.5s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn-primary { background: #e17055; color: white; width: 100%; }
        .btn-primary:hover { background: #d63031; transform: translateY(-2px); }
        .btn-secondary { background: #74b9ff; color: white; }
        .btn-secondary:hover { background: #0984e3; }
        .btn-success { background: #00b894; color: white; }
        .btn-success:hover { background: #00cec9; }
        .btn-danger { background: #d63031; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-submit { background: #00b894; color: white; }
        .btn-submit:hover { background: #00cec9; }
        .btn:disabled { background: #b2bec3; cursor: not-allowed; transform: none; }
        
        .result { text-align: center; padding: 20px; }
        .result h2 { color: #e17055; margin-bottom: 20px; }
        
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(225, 112, 85, 0.3);
            animation: popIn 0.6s ease-out;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
        }
        
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #dfe6e9;
        }
        
        .stat-item:last-child { border-bottom: none; }
        
        .evaluation {
            font-size: 20px;
            padding: 15px;
            background: #ffeaa7;
            border-radius: 15px;
            margin-top: 15px;
        }
        
        /* ✅ 修复：hidden 用 !important */
        .hidden { display: none !important; }
        
        /* 🆕 页面导航栏 */
        .page-nav, .notebook-nav {
            text-align: left;
            margin-bottom: 15px;
        }
        
        .notebook-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #dfe6e9;
        }
        
        /* 🆕 返回按钮 */
        .btn-back {
            padding: 8px 16px;
            background: white;
            border: 2px solid #74b9ff;
            color: #74b9ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .btn-back:hover {
            background: #74b9ff;
            color: white;
            transform: translateX(-3px);
            box-shadow: 0 4px 10px rgba(116, 185, 255, 0.3);
        }
        
        .btn-back:active { transform: translateX(0); }
        
        /* 错题本样式 */
        .notebook {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .notebook-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dfe6e9;
        }
        
        .notebook-stats {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
            flex-wrap: wrap;
        }
        
        .notebook-stat {
            background: white;
            padding: 8px 12px;
            border-radius: 10px;
            color: #636e72;
        }
        
        .notebook-stat strong {
            color: #e17055;
            font-size: 18px;
            margin-left: 5px;
        }
        
        .wrong-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #d63031;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .wrong-item.mastered {
            opacity: 0.5;
            border-left-color: #00b894;
        }
        
        .wrong-question {
            font-size: 24px;
            font-weight: bold;
            color: #2d3436;
        }
        
        .wrong-info {
            font-size: 13px;
            color: #636e72;
        }
        
        .wrong-actions {
            display: flex;
            gap: 8px;
        }
        
        .wrong-actions button {
            padding: 6px 12px;
            font-size: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-master { background: #00b894; color: white; }
        .btn-delete { background: #d63031; color: white; }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #636e72;
        }
        
        .empty-state .emoji { font-size: 60px; margin-bottom: 10px; }
        
        /* 导出按钮 */
        .export-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #dfe6e9;
        }
        
        .btn-export {
            padding: 10px 5px;
            background: white;
            border: 2px solid #74b9ff;
            color: #74b9ff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .btn-export:hover {
            background: #74b9ff;
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-export .emoji { font-size: 18px; }
        
        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.2s;
        }
        
        .modal.hidden { display: none !important; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }
        
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #e17055;
            margin-bottom: 15px;
            text-align: center;
        }
        
        .modal-row {
            margin-bottom: 15px;
        }
        
        .modal-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2d3436;
        }
        
        .modal-row input {
            width: 100%;
            padding: 10px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons .btn { flex: 1; }
        
        /* 主题选择 */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        
        .theme-option {
            padding: 15px;
            border: 3px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .theme-option:hover { transform: scale(1.05); }
        .theme-option.active { border-color: #e17055; }
        
        .theme-cute { background: linear-gradient(135deg, #ffeaa7, #fab1a0); }
        .theme-blue { background: linear-gradient(135deg, #74b9ff, #0984e3); color: white; }
        .theme-green { background: linear-gradient(135deg, #55efc4, #00b894); }
        .theme-purple { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; }
        .theme-dark { background: linear-gradient(135deg, #2d3436, #636e72); color: white; }
        .theme-pink { background: linear-gradient(135deg, #fd79a8, #e84393); color: white; }
        
        /* 微信二维码 */
        .qr-code-box {
            text-align: center;
            padding: 20px;
        }
        
        .qr-code-img {
            max-width: 250px;
            margin: 15px auto;
            border: 3px solid #e17055;
            border-radius: 10px;
            padding: 10px;
            background: white;
        }
        
        /* 🆕 二维码内容预览 */
        .qr-text-preview {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #dfe6e9;
        }
        
        .qr-text-preview details { cursor: pointer; }
        
        .qr-text-preview summary {
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 13px;
            color: #2d3436;
            user-select: none;
        }
        
        .qr-text-preview summary:hover { background: #dfe6e9; }
        
        .qr-text-preview textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #dfe6e9;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
            resize: vertical;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b894;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0, 184, 148, 0.4);
            z-index: 99999;
            font-weight: bold;
            animation: toastIn 0.3s ease-out;
        }
        
        .toast.error { background: #d63031; }
        .toast.warn { background: #fdcb6e; color: #2d3436; }
        
        @keyframes toastIn {
            from { transform: translate(-50%, -20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #e17055;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="top-buttons">
        <button class="icon-btn" id="soundToggle" onclick="toggleSound()" title="音效开关">🔊</button>
        <button class="icon-btn" id="notebookBtn" onclick="openNotebook()" title="错题本">
            📚<span class="badge" id="notebookBadge"></span>
        </button>
        <button class="icon-btn" id="settingsBtn" onclick="openSettings()" title="设置">⚙️</button>
    </div>
    
    <div class="container">
        <h1>🎓 小学1年级 算数练习</h1>
        <p class="subtitle">加油！你是最棒的！💪</p>
        
        <!-- ✅ 主菜单（初始显示） -->
        <div id="settings" class="settings">
            <div class="setting-row">
                <label>📚 题型：</label>
                <div class="btn-group">
                    <button class="btn-option active" data-type="add">➕ 加法</button>
                    <button class="btn-option" data-type="sub">➖ 减法</button>
                    <button class="btn-option" data-type="mix">🔀 混合</button>
                </div>
            </div>
            <div class="setting-row">
                <label>🔢 题数：</label>
                <input type="number" id="questionCount" value="5" min="1" max="20">
            </div>
            <button class="btn btn-primary" onclick="playClickSound(); startGame()">🚀 开始练习</button>
            
            <div class="menu-buttons">
                <button class="btn btn-secondary" onclick="playClickSound(); startReviewMode()">📖 错题练习</button>
                <button class="btn btn-success" onclick="playClickSound(); openNotebook()">📚 查看错题本</button>
            </div>
        </div>
        
        <!-- ✅ 题目页面（带返回按钮） -->
        <div id="questionArea" class="question-area hidden">
            <div class="page-nav">
                <button class="btn-back" onclick="playClickSound(); goHome()">
                    ← 返回主菜单
                </button>
            </div>
            <div class="question-number" id="questionNumber"></div>
            <div class="question-text" id="questionText"></div>
            <div class="feedback" id="feedback"></div>
            <button class="btn btn-submit" id="submitBtn" onclick="playClickSound(); submitAnswer()">提交答案 ✅</button>
        </div>
        
        <!-- ✅ 结果页面（带返回按钮） -->
        <div id="resultArea" class="result hidden">
            <div class="page-nav">
                <button class="btn-back" onclick="playClickSound(); goHome()">
                    ← 返回主菜单
                </button>
            </div>
            <h2>🎉 练习完成！</h2>
            <div class="score-circle" id="scoreCircle">0%</div>
            <div class="stats" id="stats"></div>
            <div class="evaluation" id="evaluation"></div>
            <button class="btn btn-primary" onclick="playClickSound(); resetGame()">🔄 再来一次</button>
            <button class="btn btn-secondary" onclick="playClickSound(); openNotebook()">📚 查看错题本</button>
        </div>
        
        <!-- ✅ 错题本页面（带返回按钮） -->
        <div id="notebookArea" class="notebook hidden">
            <div class="notebook-nav">
                <button class="btn-back" onclick="playClickSound(); goHome()">
                    ← 返回主菜单
                </button>
            </div>
            
            <div class="notebook-header">
                <h2>📚 我的错题本</h2>
                <button class="btn btn-danger" onclick="clearNotebook()" style="padding: 8px 16px; font-size: 14px;">🗑️ 清空</button>
            </div>
            
            <div class="notebook-stats" id="notebookStats"></div>
            
            <div class="export-buttons">
                <button class="btn-export" onclick="copyToClipboard()">
                    <span class="emoji">📋</span>复制
                </button>
                <button class="btn-export" onclick="showExportImageModal()">
                    <span class="emoji">🖼️</span>图片
                </button>
                <button class="btn-export" onclick="exportAsPDF()">
                    <span class="emoji">📄</span>PDF
                </button>
                <button class="btn-export" onclick="exportAsTxt()">
                    <span class="emoji">💾</span>文本
                </button>
                <button class="btn-export" onclick="showEmailModal()">
                    <span class="emoji">📧</span>邮件
                </button>
                <button class="btn-export" onclick="showQRCodeModal()">
                    <span class="emoji">📱</span>小程序
                </button>
            </div>
            
            <div id="wrongList"></div>
            
            <div class="notebook-footer">
                <button class="btn btn-primary" onclick="playClickSound(); goHome()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>
    </div>
    
    <!-- ✅ 所有模态框默认隐藏 -->
    
    <!-- 邮件模态框 -->
    <div id="emailModal" class="modal hidden" onclick="if(event.target===this)closeModal('emailModal')">
        <div class="modal-content">
            <div class="modal-title">📧 发送到邮箱</div>
            <div class="modal-row">
                <label>收件人邮箱：</label>
                <input type="email" id="emailTo" placeholder="例如：parent@example.com">
            </div>
            <div class="modal-row">
                <label>主题：</label>
                <input type="text" id="emailSubject" value="孩子的错题本" placeholder="邮件主题">
            </div>
            <div class="modal-row">
                <label>附加消息（可选）：</label>
                <input type="text" id="emailMessage" placeholder="给家长的话">
            </div>
            <div class="modal-buttons">
                <button class="btn btn-danger" onclick="closeModal('emailModal')">取消</button>
                <button class="btn btn-primary" onclick="sendEmail()">📧 发送</button>
            </div>
        </div>
    </div>
    
    <!-- ✅ 二维码模态框（修复乱码） -->
    <div id="qrModal" class="modal hidden" onclick="if(event.target===this)closeModal('qrModal')">
        <div class="modal-content">
            <div class="modal-title">📱 分享错题本</div>
            
            <div class="qr-code-box">
                <p style="color:#636e72;font-size:14px;">扫码查看错题本</p>
                <div id="qrCodeContainer">
                    <div class="loading"></div>
                    <p>生成中...</p>
                </div>
                <p style="color:#636e72;font-size:12px;margin-top:10px;">
                    📱 用微信扫一扫即可查看
                </p>
            </div>
            
            <!-- 🆕 错题内容预览 -->
            <div class="qr-text-preview">
                <details>
                    <summary>📋 查看错题内容（可复制）</summary>
                    <textarea id="qrTextContent" readonly></textarea>
                    <button class="btn btn-secondary" style="margin-top: 10px; padding: 8px; font-size: 13px; width: 100%;" 
                            onclick="copyQRText()">📋 复制错题内容</button>
                </details>
            </div>
            
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="downloadQRCode()">💾 保存图片</button>
                <button class="btn btn-danger" onclick="closeModal('qrModal')">关闭</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 配置 ============
        const CONFIG = {
            EMAIL_SERVICE: 'https://formspree.io/f/YOUR_FORM_ID',
            CLOUD_BIN_ID: 'YOUR_BIN_ID',
            CLOUD_API_KEY: 'YOUR_API_KEY',
            CLOUD_API_URL: 'https://api.jsonbin.io/v3/b',
            THEMES: {
                cute: { name: '🌈 彩虹', bg1: '#ffeaa7', bg2: '#fab1a0', text: '#2d3436' },
                blue: { name: '🌊 海洋', bg1: '#74b9ff', bg2: '#0984e3', text: 'white' },
                green: { name: '🌿 森林', bg1: '#55efc4', bg2: '#00b894', text: '#2d3436' },
                purple: { name: '🌌 星空', bg1: '#a29bfe', bg2: '#6c5ce7', text: 'white' },
                dark: { name: '🌙 夜晚', bg1: '#2d3436', bg2: '#636e72', text: 'white' },
                pink: { name: '🌸 樱花', bg1: '#fd79a8', bg2: '#e84393', text: 'white' }
            }
        };
        
        let currentTheme = localStorage.getItem('export_theme') || 'cute';
        
        // ============ 音效系统 ============
        let soundEnabled = true;
        let audioContext = null;
        
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playNote(frequency, duration, startTime = 0, volume = 0.3) {
            if (!soundEnabled || !audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.type = 'sine';
            oscillator.frequency.value = frequency;
            const now = audioContext.currentTime + startTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(volume, now + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            oscillator.start(now);
            oscillator.stop(now + duration);
        }
        
        function playCorrectSound() {
            initAudio();
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                playNote(freq, 0.2, i * 0.08, 0.3);
            });
        }
        
        function playWrongSound() {
            initAudio();
            playNote(220, 0.15, 0, 0.3);
            playNote(196, 0.3, 0.15, 0.3);
        }
        
        function playCompleteSound() {
            initAudio();
            const melody = [
                { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.15 },
                { f: 783.99, d: 0.15 }, { f: 1046.50, d: 0.15 },
                { f: 783.99, d: 0.15 }, { f: 1046.50, d: 0.4 }
            ];
            let time = 0;
            melody.forEach(note => { playNote(note.f, note.d, time, 0.3); time += note.d; });
        }
        
        function playClickSound() {
            initAudio();
            playNote(800, 0.05, 0, 0.1);
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById('soundToggle');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            btn.classList.toggle('muted', !soundEnabled);
            localStorage.setItem('sound_enabled', soundEnabled);
        }
        
        // ============ 错题本系统 ============
        const STORAGE_KEY = 'math_practice_wrong_questions';
        
        function getWrongQuestions() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        function saveWrongQuestions(questions) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
            updateNotebookBadge();
        }
        
        function addWrongQuestion(question, userAnswer) {
            const wrong = getWrongQuestions();
            const exists = wrong.find(w => w.text === question.text);
            if (exists) {
                exists.errorCount = (exists.errorCount || 1) + 1;
                exists.lastWrongAt = new Date().toISOString();
                exists.userAnswer = userAnswer;
                exists.mastered = false;
            } else {
                wrong.unshift({
                    id: Date.now(),
                    text: question.text,
                    question: {
                        numberA: question.numberA,
                        numberB: question.numberB,
                        operator: question.operator
                    },
                    correctAnswer: question.answer,
                    userAnswer: userAnswer,
                    errorCount: 1,
                    createdAt: new Date().toISOString(),
                    lastWrongAt: new Date().toISOString(),
                    mastered: false
                });
            }
            saveWrongQuestions(wrong);
        }
        
        function markAsMastered(id) {
            const wrong = getWrongQuestions();
            const item = wrong.find(w => w.id === id);
            if (item) {
                item.mastered = true;
                item.masteredAt = new Date().toISOString();
            }
            saveWrongQuestions(wrong);
            renderNotebook();
        }
        
        function deleteWrongQuestion(id) {
            const wrong = getWrongQuestions().filter(w => w.id !== id);
            saveWrongQuestions(wrong);
            renderNotebook();
        }
        
        function clearNotebook() {
            if (confirm('⚠️ 确定要清空错题本吗？')) {
                saveWrongQuestions([]);
                renderNotebook();
            }
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = (now - date) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            return date.toLocaleDateString('zh-CN');
        }
        
        function updateNotebookBadge() {
            const wrong = getWrongQuestions();
            const unmastered = wrong.filter(w => !w.mastered).length;
            document.getElementById('notebookBadge').textContent = unmastered > 0 ? unmastered : '';
        }
        
        function renderNotebook() {
            const wrong = getWrongQuestions();
            const stats = document.getElementById('notebookStats');
            const list = document.getElementById('wrongList');
            
            const total = wrong.length;
            const mastered = wrong.filter(w => w.mastered).length;
            const unmastered = total - mastered;
            
            stats.innerHTML = `
                <div class="notebook-stat">📊 总错题<strong>${total}</strong></div>
                <div class="notebook-stat">✅ 已掌握<strong>${mastered}</strong></div>
                <div class="notebook-stat">❗ 待复习<strong>${unmastered}</strong></div>
            `;
            
            if (total === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🎉</div>
                        <h3>错题本是空的！</h3>
                        <p>做错的题会自动加入这里</p>
                    </div>
                `;
                return;
            }
            
            const sorted = wrong.sort((a, b) => {
                if (a.mastered !== b.mastered) return a.mastered ? 1 : -1;
                return new Date(b.lastWrongAt) - new Date(a.lastWrongAt);
            });
            
            list.innerHTML = sorted.map(item => `
                <div class="wrong-item ${item.mastered ? 'mastered' : ''}">
                    <div style="flex:1; min-width:200px;">
                        <div class="wrong-question">${item.text.replace('?', '=')} <span style="color:#00b894;">${item.correctAnswer}</span></div>
                        <div class="wrong-info">
                            你的答案：<span style="color:#d63031;text-decoration:line-through;">${item.userAnswer}</span> 
                            ${item.mastered ? '✅ 已掌握' : `· 错了 ${item.errorCount} 次 · ${formatTime(item.lastWrongAt)}`}
                        </div>
                    </div>
                    <div class="wrong-actions">
                        ${!item.mastered ? `<button class="btn-master" onclick="markAsMastered(${item.id})">✓ 掌握</button>` : ''}
                        <button class="btn-delete" onclick="deleteWrongQuestion(${item.id})">🗑️</button>
                    </div>
                </div>
            `).join('');
        }
        
        function openNotebook() {
            document.getElementById('settings').classList.add('hidden');
            document.getElementById('questionArea').classList.add('hidden');

        // ============ Toast ============
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast' + (type !== 'success' ? ' ' + type : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => toast.remove(), 2500);
        }
        
        // ============ 导出：复制 ============
        function generateWrongQuestionsText() {
            const wrong = getWrongQuestions();
            if (wrong.length === 0) return '🎉 错题本是空的！';
            
            const sorted = [...wrong].sort((a, b) => {
                if (a.mastered !== b.mastered) return a.mastered ? 1 : -1;
                return new Date(b.lastWrongAt) - new Date(a.lastWrongAt);
            });
            
            const today = new Date().toLocaleDateString('zh-CN');
            let text = `╔══════════════════════════════════╗\n`;
            text += `║   📚 我的错题本  (${today})     ║\n`;
            text += `╚══════════════════════════════════╝\n\n`;
            text += `📊 总计：${sorted.length} 题\n`;
            text += `❗ 待复习：${sorted.filter(w => !w.mastered).length} 题\n`;
            text += `✅ 已掌握：${sorted.filter(w => w.mastered).length} 题\n\n`;
            text += `${'─'.repeat(40)}\n\n`;
            
            sorted.forEach((item, index) => {
                const status = item.mastered ? '[✅ 已掌握]' : '[❗ 待复习]';
                const questionText = item.text.replace('?', `= ${item.correctAnswer}`);
                text += `${index + 1}. ${status} ${questionText}\n`;
                text += `   你的答案：${item.userAnswer} | 错了 ${item.errorCount} 次 | ${formatTime(item.lastWrongAt)}\n\n`;
            });
            
            text += `${'─'.repeat(40)}\n`;
            text += `🌟 加油小朋友，错题越练越少！\n`;
            return text;
        }
        
        async function copyToClipboard() {
            playClickSound();
            const text = generateWrongQuestionsText();
            
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                }
                showToast('✅ 已复制到剪贴板！');
            } catch (err) {
                alert('复制失败：\n\n' + text);
            }
        }

            const a = document.createElement('a');
            const today = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `错题本_${today}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('💾 文本文件已下载！');

        function doExportImage(wrong) {
            const theme = CONFIG.THEMES[currentTheme];
            const sorted = [...wrong].sort((a, b) => {
                if (a.mastered !== b.mastered) return a.mastered ? 1 : -1;
                return new Date(b.lastWrongAt) - new Date(a.lastWrongAt);
            });
            
            const preview = document.createElement('div');
            preview.style.cssText = `
                position: fixed; top: -10000px; left: -10000px;
                width: 700px; padding: 40px;
                background: linear-gradient(135deg, ${theme.bg1}, ${theme.bg2});
                font-family: 'Microsoft YaHei', sans-serif;
                color: ${theme.text};
            `;
            
            const mastered = wrong.filter(w => w.mastered).length;
            
            preview.innerHTML = `
                <div style="text-align:center;margin-bottom:25px;padding-bottom:20px;border-bottom:3px solid ${theme.text === 'white' ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.1)'};">
                    <h1 style="font-size:36px;margin-bottom:10px;">📚 我的错题本</h1>
                    <p style="opacity:0.8;font-size:14px;">${new Date().toLocaleString('zh-CN')} | 共 ${sorted.length} 题 | 待复习 ${sorted.length - mastered} 题</p>
                </div>
                ${sorted.map((item, i) => `
                    <div style="
                        background: ${theme.text === 'white' ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.7)'};
                        backdrop-filter: blur(10px);
                        padding: 15px 20px;
                        margin-bottom: 12px;
                        border-radius: 12px;
                        border-left: 5px solid ${item.mastered ? '#00b894' : '#d63031'};
                        ${item.mastered ? 'opacity: 0.6;' : ''}
                    ">
                        <div style="font-size:22px;font-weight:bold;margin-bottom:5px;">
                            ${i + 1}. ${item.text.replace('?', '')} = 
                            <span style="color:#00b894;">${item.correctAnswer}</span>
                        </div>
                        <div style="font-size:13px;opacity:0.85;">
                            ${item.mastered ? '✅ 已掌握' : `错了 ${item.errorCount} 次`} · 
                            你的答案：<span style="color:#d63031;text-decoration:line-through;">${item.userAnswer}</span>
                        </div>
                    </div>
                `).join('')}
                <div style="text-align:center;margin-top:30px;padding-top:20px;border-top:2px dashed ${theme.text === 'white' ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.1)'};font-size:14px;opacity:0.8;">
                    🌟 加油！错题越练越少！🌟
                </div>
            `;
            
            document.body.appendChild(preview);
            showToast('🖼️ 正在生成图片...');
            
            html2canvas(preview, {
                backgroundColor: null,
                scale: 2,
                logging: false
            }).then(canvas => {
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    const today = new Date().toISOString().slice(0, 10);
                    a.href = url;
                    a.download = `错题本_${currentTheme}_${today}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    document.body.removeChild(preview);
                    showToast('✅ 图片已下载！');
                });
            }).catch(err => {
                console.error(err);
                document.body.removeChild(preview);
                alert('图片生成失败：' + err.message);
            });
        }

        // ============ 游戏系统 ============
        let gameState = {
            type: 'add',
            totalCount: 5,
            currentIndex: 0,
            correctCount: 0,
            questions: [],
            currentAnswer: null,
            currentQuestionData: null,
            startTime: null,
            isReviewMode: false
        };
        
        document.querySelectorAll('.btn-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                gameState.type = this.dataset.type;
                playClickSound();
            });
        });
        
        function generateAddition() {
            const a = Math.floor(Math.random() * 11);
            const b = Math.floor(Math.random() * (11 - a));
            return { text: `${a} + ${b} = ?`, answer: a + b, numberA: a, numberB: b, operator: '+' };
        }
        
        function generateSubtraction() {
            const a = Math.floor(Math.random() * 10) + 1;
            const b = Math.floor(Math.random() * (a + 1));
            return { text: `${a} - ${b} = ?`, answer: a - b, numberA: a, numberB: b, operator: '-' };
        }
        
        function generateQuestion() {
            if (gameState.type === 'add') return generateAddition();
            if (gameState.type === 'sub') return generateSubtraction();
            return Math.random() < 0.5 ? generateAddition() : generateSubtraction();
        }
        
        function startGame() {
            gameState.totalCount = parseInt(document.getElementById('questionCount').value) || 5;
            gameState.currentIndex = 0;
            gameState.correctCount = 0;
            gameState.questions = [];
            gameState.startTime = new Date();
            gameState.isReviewMode = false;
            
            for (let i = 0; i < gameState.totalCount; i++) {
                gameState.questions.push(generateQuestion());
            }
            
            document.getElementById('settings').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('notebookArea').classList.add('hidden');
            document.getElementById('questionArea').classList.remove('hidden');
            
            showQuestion();
        }
        
        function startReviewMode() {
            const wrong = getWrongQuestions().filter(w => !w.mastered);
            if (wrong.length === 0) {
                alert('🎉 错题本是空的！先去练习吧！');
                return;
            }
            
            gameState.totalCount = wrong.length;
            gameState.currentIndex = 0;
            gameState.correctCount = 0;
            gameState.questions = wrong.map(w => ({
                text: w.text,
                answer: w.correctAnswer,
                numberA: w.question.numberA,
                numberB: w.question.numberB,
                operator: w.question.operator,
                wrongId: w.id
            }));
            gameState.startTime = new Date();
            gameState.isReviewMode = true;
            
            document.getElementById('settings').classList.add('hidden');
            document.getElementById('notebookArea').classList.add('hidden');
            document.getElementById('questionArea').classList.remove('hidden');
            
            showQuestion();
        }
        
        function showQuestion() {
            const q = gameState.questions[gameState.currentIndex];
            gameState.currentAnswer = q.answer;
            gameState.currentQuestionData = q;
            
            const prefix = gameState.isReviewMode ? '📖 错题复习 ' : '';
            document.getElementById('questionNumber').textContent = 
                `${prefix}第 ${gameState.currentIndex + 1} / ${gameState.totalCount} 题`;
            document.getElementById('questionText').innerHTML = 
                q.text.replace('?', '<input type="number" id="answerInput" class="answer-input" autofocus>');
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            
            setTimeout(() => {
                const input = document.getElementById('answerInput');
                if (input) input.focus();
            }, 50);
            
            document.getElementById('answerInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitAnswer();
            });
        }
        
        function submitAnswer() {
            const input = document.getElementById('answerInput');
            if (!input) return;
            
            const userAnswer = parseInt(input.value);
            const feedback = document.getElementById('feedback');
            const q = gameState.currentQuestionData;
            
            if (isNaN(userAnswer)) {
                feedback.textContent = '⚠️ 请输入一个数字！';
                feedback.className = 'feedback wrong';
                playWrongSound();
                return;
            }
            
            if (userAnswer === gameState.currentAnswer) {
                gameState.correctCount++;
                feedback.textContent = '🎉 答对啦！你真棒！';
                feedback.className = 'feedback correct';
                playCorrectSound();
                
                if (gameState.isReviewMode && q.wrongId) {
                    setTimeout(() => markAsMasteredSilent(q.wrongId), 800);
                }
            } else {
                feedback.textContent = `❌ 答错了，正确答案是 ${gameState.currentAnswer}`;
                feedback.className = 'feedback wrong';
                playWrongSound();
                addWrongQuestion(q, userAnswer);
            }
            
            input.disabled = true;
            document.getElementById('submitBtn').disabled = true;
            
            setTimeout(() => {
                gameState.currentIndex++;
                if (gameState.currentIndex < gameState.totalCount) {
                    document.getElementById('submitBtn').disabled = false;
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1500);
        }
        
        function markAsMasteredSilent(id) {
            const wrong = getWrongQuestions();
            const item = wrong.find(w => w.id === id);
            if (item) {
                item.mastered = true;
                item.masteredAt = new Date().toISOString();
            }
            saveWrongQuestions(wrong);
        }
        
        function showResult() {
            const rate = (gameState.correctCount / gameState.totalCount * 100).toFixed(1);
            const elapsed = Math.floor((new Date() - gameState.startTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            
            let evaluation = '';
            if (rate == 100) evaluation = '🏆 满分！你太厉害了！';
            else if (rate >= 90) evaluation = '🌟 太厉害了！你是数学小天才！';
            else if (rate >= 70) evaluation = '👍 表现不错，继续加油！';
            else if (rate >= 50) evaluation = '💪 还需努力，多练习就会进步！';
            else evaluation = '📖 别灰心，做错的题可以到错题本复习哦！';
            
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('notebookArea').classList.add('hidden');
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('scoreCircle').textContent = rate + '%';
            document.getElementById('stats').innerHTML = `
                <div class="stat-item"><span>📝 总题数</span><strong>${gameState.totalCount}</strong></div>
                <div class="stat-item"><span>✅ 答对</span><strong style="color:#00b894">${gameState.correctCount}</strong></div>
                <div class="stat-item"><span>❌ 答错</span><strong style="color:#d63031">${gameState.totalCount - gameState.correctCount}</strong></div>
                <div class="stat-item"><span>⏱️ 用时</span><strong>${minutes}分${seconds}秒</strong></div>
            `;
            document.getElementById('evaluation').textContent = evaluation;
            
            playCompleteSound();
        }
        
        function resetGame() {
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('settings').classList.remove('hidden');
        }
        
        // ============ ✅ 初始化（修复版） ============
        function init() {
            // 恢复音效设置
            const savedSound = localStorage.getItem('sound_enabled');
            if (savedSound !== null) {
                soundEnabled = savedSound === 'true';
                document.getElementById('soundToggle').textContent = soundEnabled ? '🔊' : '🔇';
                document.getElementById('soundToggle').classList.toggle('muted', !soundEnabled);
            }
            
            // ✅ 强制隐藏所有模态框
            document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
            
            // ✅ 确保只显示初始页面（主菜单）
            document.getElementById('settings').classList.remove('hidden');
            document.getElementById('questionArea').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('notebookArea').classList.add('hidden');
            
            updateNotebookBadge();
            
            // ✅ ESC 键关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal').forEach(m => m.classList.add('hidden'));
                }
            });
        }
        
        // 立即执行
        init();
    </script>
</body>
</html>
