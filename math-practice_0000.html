<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script>
    window.onload = function () {
        // 禁用右键菜单
        document.addEventListener('contextmenu', e => e.preventDefault());
        // 禁用文本选择
        document.body.style.cssText += `
          -webkit-user-select: none;
          -moz-user-select: none;
          -ms-user-select: none;
          user-select: none;
        `;
    };
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 小学1年级 算数练习</title>
    <!-- 跨页面监控 -->
    <script>
        // 模拟获取 IP (实际项目中建议由后端注入或使用 API)
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) {
                return 'Unknown';
            }
        }

        async function reportVisit() {
            const ip = await getIP();
            const record = {
                id: Date.now(),
                page: 'Page B',
                ip: ip,
                time: new Date().toLocaleString(),
                ua: navigator.userAgent,
                device: /Mobile/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop'
            };

            // 1. 获取旧记录
            let logs = JSON.parse(localStorage.getItem('global_visit_logs') || '[]');
            
            // 2. 添加新记录
            logs.unshift(record);
            
            // 3. 限制数量 (保留最近 50 条)
            if (logs.length > 50) logs.pop();

            // 4. 存回 localStorage (模拟写入数据库)
            localStorage.setItem('global_visit_logs', JSON.stringify(logs));

            // console.log('✅ 访问记录已上报:', record);
        }

        // 页面加载即上报
        window.onload = reportVisit;
    </script>
    <!-- 跨页面监控 -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin: 5px;
        }
        
        .btn-primary { background: #e17055; color: white; width: 100%; }
        .btn-primary:hover { background: #d63031; transform: translateY(-2px); }
        .btn-secondary { background: #74b9ff; color: white; }
        .btn-secondary:hover { background: #0984e3; }
        .btn-success { background: #00b894; color: white; }
        .btn-success:hover { background: #00cec9; }
        .btn-danger { background: #d63031; color: white; }
        .btn-danger:hover { background: #c0392b; }
        .btn-submit { background: #00b894; color: white; }
        .btn-submit:hover { background: #00cec9; }
        .btn:disabled { background: #b2bec3; cursor: not-allowed; transform: none; }
        
        .result { text-align: center; padding: 20px; }

        .score-circle {

            border-radius: 50%;

            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            margin: 20px auto;
            box-shadow: 0 10px 30px rgba(225, 112, 85, 0.3);
            animation: popIn 0.6s ease-out;
        }
        
        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        
        .stats { background: #f8f9fa; padding: 15px; border-radius: 15px; margin: 20px 0; }
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #dfe6e9; }
        .stat-item:last-child { border-bottom: none; }
        .evaluation { font-size: 20px; padding: 15px; background: #ffeaa7; border-radius: 15px; margin-top: 15px; }
        
        .hidden { display: none !important; }
        
        .page-nav, .notebook-nav { text-align: left; margin-bottom: 15px; }
        .notebook-footer { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #dfe6e9; }
        
        .btn-back {
            padding: 8px 16px;
            background: white;
            border: 2px solid #74b9ff;
            color: #74b9ff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;

            color: white;
            transform: translateX(-3px);
            box-shadow: 0 4px 10px rgba(116, 185, 255, 0.3);
        }
        
        .notebook {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .notebook-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dfe6e9;
        }
        
        .notebook-stats { display: flex; gap: 15px; margin-bottom: 15px; font-size: 14px; flex-wrap: wrap; }
        .notebook-stat { background: white; padding: 8px 12px; border-radius: 10px; color: #636e72; }
        .notebook-stat strong { color: #e17055; font-size: 18px; margin-left: 5px; }
        
        .wrong-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #d63031;

        }
        
        .wrong-item.mastered { opacity: 0.5; border-left-color: #00b894; }

        .wrong-info { font-size: 13px; color: #636e72; }
        .wrong-actions { display: flex; gap: 8px; }

            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-delete { background: #d63031; color: white; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #636e72; }
        .empty-state .emoji { font-size: 60px; margin-bottom: 10px; }
        
        .export-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #dfe6e9;
        }
        
        .btn-export {
            padding: 10px 5px;
            background: white;
            border: 2px solid #74b9ff;
            color: #74b9ff;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .btn-export:hover { background: #74b9ff; color: white; transform: translateY(-2px); }
        .btn-export .emoji { font-size: 18px; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.2s;
        }
        
        .modal.hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }
        
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-title { font-size: 20px; font-weight: bold; color: #e17055; margin-bottom: 15px; text-align: center; }
        .modal-row { margin-bottom: 15px; }

        .modal-row input { width: 100%; padding: 10px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 14px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons .btn { flex: 1; }
        
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .theme-option { padding: 15px; border: 3px solid transparent; border-radius: 12px; cursor: pointer; text-align: center; font-size: 12px; font-weight: bold; transition: all 0.3s; }
        .theme-option:hover { transform: scale(1.05); }
        .theme-option.active { border-color: #e17055; }
        .theme-cute { background: linear-gradient(135deg, #ffeaa7, #fab1a0); }
        .theme-blue { background: linear-gradient(135deg, #74b9ff, #0984e3); color: white; }
        .theme-green { background: linear-gradient(135deg, #55efc4, #00b894); }
        .theme-purple { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; }
        .theme-dark { background: linear-gradient(135deg, #2d3436, #636e72); color: white; }
        .theme-pink { background: linear-gradient(135deg, #fd79a8, #e84393); color: white; }
        
        .qr-code-box { text-align: center; padding: 20px; }
        .qr-code-img { max-width: 250px; margin: 15px auto; border: 3px solid #e17055; border-radius: 10px; padding: 10px; background: white; }
        .qr-text-preview { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #dfe6e9; }
        .qr-text-preview details { cursor: pointer; }
        .qr-text-preview summary { padding: 8px; background: #f8f9fa; border-radius: 8px; font-size: 13px; color: #2d3436; user-select: none; }
        .qr-text-preview summary:hover { background: #dfe6e9; }
        .qr-text-preview textarea { width: 100%; height: 150px; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 10px; resize: vertical; }
        
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #00b894;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0, 184, 148, 0.4);
            z-index: 99999;
            font-weight: bold;
        }
        
        .toast.error { background: #d63031; }
        .toast.warn { background: #fdcb6e; color: #2d3436; }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #e17055;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        
        /* ============ 答案输入框样式 ============ */
        .answer-input {
            display: inline-block;
            font-size: 48px !important;
            font-weight: bold !important;
            width: 140px !important;
            text-align: center !important;
            border: 3px solid #e17055 !important;
            border-radius: 12px !important;
            outline: none !important;
            color: #e17055 !important;
            background: white !important;
            padding: 8px 12px !important;
        }
        
        .answer-input:focus {
            border-color: #d63031 !important;
            box-shadow: 0 0 0 3px rgba(225, 112, 85, 0.2) !important;
        }
        
        /* ============ 题数输入框样式 ============ */
        #questionCount {
            font-size: 18px !important;
            width: 90px !important;
            padding: 10px 14px !important;
            text-align: center;
            font-weight: bold;
        }
        
        /* ============ 📱 只在移动端隐藏上下箭头 ============ */
        /* 媒体查询：只在屏幕宽度 ≤ 768px 时生效（手机） */
        @media (max-width: 768px) {
            .answer-input::-webkit-outer-spin-button,
            .answer-input::-webkit-inner-spin-button,
            #questionCount::-webkit-outer-spin-button,
            #questionCount::-webkit-inner-spin-button {
                -webkit-appearance: none !important;
                margin: 0 !important;
            }
            
            .answer-input {
                font-size: 36px !important;
                width: 120px !important;
            }
            
            .question-text {
                font-size: 36px !important;
                letter-spacing: 2px !important;
            }
        }
        
        /* ============ 🖥️ 桌面端额外优化 ============ */
        /* 媒体查询：只在屏幕宽度 > 768px 时生效（电脑） */
        @media (min-width: 769px) {
            /* 桌面端特殊样式 */
            .answer-input:hover {
                border-color: #d63031 !important;
            }
        }
        
        /* 進捗バーの外枠（グレーの背景） */
        .progress-container {
            width: 100%;
            max-width: 300px; /* 画面に合わせて適宜調整してください */
            background-color: #eef2f3;
            border-radius: 10px;
            height: 8px;
            margin: 8px auto; /* 中央寄せ */
            overflow: hidden;
        }
        
        /* 進捗バーの中身（緑色のゲージ） */
        .progress-bar {
            height: 100%;
            width: 0%; /* 初期値（10問中1問目の場合） */
            /* background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); */ /* 綺麗な青〜水色のグラデ */
            /* ボタンの緑色に合わせる場合はこちら： background: linear-gradient(90deg, #10b981 0%, #059669 100%); */
            
            /* 左から右へ流れる綺麗なエメラルドグリーン */
            background: linear-gradient(90deg, #00d2ff 0%, #00c7a3 100%);
            border-radius: 10px;
            /* transition: width 0.3s ease;*/ /* ゲージが伸びる時のアニメーション */
            /* 滑らかにゲージを動かすアニメーション */
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
    <div class="top-buttons">
        <button class="icon-btn" id="soundToggle" title="音效开关">🔊</button>
        <button class="icon-btn" id="notebookBtn" title="错题本">📚<span class="badge" id="notebookBadge"></span></button>
        <button class="icon-btn" id="settingsBtn" title="设置">⚙️</button>
    </div>
    
    <div class="container">
        <h1>🎓 小学1年级 算数练习</h1>
        <p class="subtitle">加油！你是最棒的！💪</p>
        
        <div id="settings" class="settings">
            <div class="setting-row">
                <label for="questionType">📚 题型：</label>
                <div class="btn-group">
                    <button class="btn-option" data-type="add">➕ 加法</button>
                    <button class="btn-option" data-type="sub">➖ 减法</button>
                    <button class="btn-option active" data-type="mix">🔀 混合</button>
                </div>
            </div>
            <div class="setting-row">
                <label for="questionQuantity">🔢 题数：</label>
                <input type="number" id="questionCount" value="8" min="1" max="50" inputmode="numeric">
                <span id="countHint" class="count-hint">(1-50题)</span>
                <div class="quick-count">
                    <button>5</button>
                    <button class="active">8</button>
                    <button>10</button>
                    <button>20</button>
                </div>
            </div>
            <button class="btn btn-primary" id="startBtn">🚀 开始练习</button>
            <div class="menu-buttons">
                <button class="btn btn-secondary" id="reviewBtn">📖 错题练习</button>
                <button class="btn btn-success" id="openNotebookBtn">📚 查看错题本</button>
            </div>
        </div>
        
        <div id="questionArea" class="question-area hidden">
            <div class="page-nav">
                <button class="btn-back" id="backFromQuestion">← 返回主菜单</button>
            </div>
            <div class="question-number" id="questionNumber"></div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="question-text" id="questionText"></div>
            <div class="feedback" id="feedback"></div>
            <button class="btn btn-submit" id="submitBtn">提交答案 ✅</button>
        </div>
        
        <div id="resultArea" class="result hidden">
            <div class="page-nav">
                <button class="btn-back" id="backFromResult">← 返回主菜单</button>
            </div>
            <h2>🎉 练习完成！</h2>
            <div class="score-circle" id="scoreCircle">0%</div>
            <div class="stats" id="stats"></div>
            <div class="evaluation" id="evaluation"></div>
            <button class="btn btn-primary" id="retryBtn">🔄 再来一次</button>
            <button class="btn btn-secondary" id="openNotebookFromResult">📚 查看错题本</button>
        </div>
        
        <div id="notebookArea" class="notebook hidden">
            <div class="notebook-nav">
                <button class="btn-back" id="backFromNotebook">← 返回主菜单</button>
            </div>
            <div class="notebook-header">
                <h2>📚 我的错题本</h2>
                <button class="btn btn-danger" id="clearNotebookBtn" style="padding: 8px 16px; font-size: 14px;">🗑️ 清空</button>
            </div>
            <div class="notebook-stats" id="notebookStats"></div>
            <div class="export-buttons">
                <button class="btn-export" id="copyBtn"><span class="emoji">📋</span>复制</button>

    <!-- 在HTML中引入库 -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- 或者使用更现代的 qrcode -->
    <!--  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>  -->
    <script>
        // ============ 全部功能 - 用最稳健的方式 ============
        
        var CONFIG = {
            EMAIL_SERVICE: 'https://formspree.io/f/YOUR_FORM_ID',
            CLOUD_BIN_ID: 'YOUR_BIN_ID',
            CLOUD_API_KEY: 'YOUR_API_KEY',
            CLOUD_API_URL: 'https://api.jsonbin.io/v3/b',
            MAX_QUESTIONS: 50,
            MIN_QUESTIONS: 1,
            THEMES: {
                cute: { name: '🌈 彩虹', bg1: '#ffeaa7', bg2: '#fab1a0', text: '#2d3436' },
                blue: { name: '🌊 海洋', bg1: '#74b9ff', bg2: '#0984e3', text: 'white' },
                green: { name: '🌿 森林', bg1: '#55efc4', bg2: '#00b894', text: '#2d3436' },
                purple: { name: '🌌 星空', bg1: '#a29bfe', bg2: '#6c5ce7', text: 'white' },
                dark: { name: '🌙 夜晚', bg1: '#2d3436', bg2: '#636e72', text: 'white' },
                pink: { name: '🌸 樱花', bg1: '#fd79a8', bg2: '#e84393', text: 'white' }
            }
        };
        
        var currentTheme = 'cute';
        var soundEnabled = true;
        var audioContext = null;
        
        var gameState = {
            type: 'add',
            totalCount: 8,
            currentIndex: 0,
            correctCount: 0,
            questions: [],
            currentAnswer: 0,
            currentQuestionData: null,
            startTime: null,
            isReviewMode: false
        };
        
        var STORAGE_KEY = 'math_practice_wrong_questions';
        
        // ============ 工具函数 ============
        
        function $(id) { return document.getElementById(id); }
        
        function showPage(pageId) {
            var pages = ['settings', 'questionArea', 'resultArea', 'notebookArea'];
            for (var i = 0; i < pages.length; i++) {
                $(pages[i]).classList.add('hidden');
            }
            if (pageId) $(pageId).classList.remove('hidden');
        }
        
        function closeAllModals() {
            var modals = document.querySelectorAll('.modal');
            for (var i = 0; i < modals.length; i++) {
                modals[i].classList.add('hidden');
            }
        }
        
        function showToast(msg, type) {
            type = type || 'success';
            var toast = document.createElement('div');
            toast.className = 'toast' + (type !== 'success' ? ' ' + type : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(function() { 
                if (toast.parentNode) toast.remove(); 
            }, 2500);
        }
        
        function formatTime(isoString) {
            var date = new Date(isoString);
            var now = new Date();
            var diff = (now - date) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            return date.toLocaleDateString('zh-CN');
        }
        
        // ============ 音效 ============
        
        function initAudio() {
            if (!audioContext) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {}
            }
        }
        
        function playNote(freq, dur, start, vol) {
            if (!soundEnabled || !audioContext) return;
            start = start || 0;
            vol = vol || 0.3;
            try {
                var osc = audioContext.createOscillator();
                var gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                var now = audioContext.currentTime + start;
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(vol, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
                osc.start(now);
                osc.stop(now + dur);
            } catch(e) {}
        }
        
        function playCorrectSound() {
            initAudio();
            [523.25, 659.25, 783.99, 1046.50].forEach(function(f, i) {
                playNote(f, 0.2, i * 0.08, 0.3);
            });
        }
        
        function playWrongSound() {
            initAudio();
            playNote(220, 0.15, 0, 0.3);
            playNote(196, 0.3, 0.15, 0.3);
        }
        
        function playCompleteSound() {
            initAudio();
            var melody = [
                {f: 523.25, d: 0.15}, {f: 659.25, d: 0.15},
                {f: 783.99, d: 0.15}, {f: 1046.50, d: 0.15},
                {f: 783.99, d: 0.15}, {f: 1046.50, d: 0.4}
            ];
            var time = 0;
            melody.forEach(function(n) { playNote(n.f, n.d, time, 0.3); time += n.d; });
        }
        
        function playClickSound() {
            initAudio();
            playNote(800, 0.05, 0, 0.1);
        }
        
        function toggleSound() {
            soundEnabled = !soundEnabled;
            var btn = $('soundToggle');
            btn.textContent = soundEnabled ? '🔊' : '🔇';
            if (soundEnabled) btn.classList.remove('muted');
            else btn.classList.add('muted');
            try { localStorage.setItem('sound_enabled', soundEnabled); } catch(e) {}
        }
        
        // ============ 错题本 ============
        
        function getWrongQuestions() {
            try {
                var data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch(e) { return []; }
        }
        
        function saveWrongQuestions(questions) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
                updateNotebookBadge();
            } catch(e) {}
        }
        
        function addWrongQuestion(question, userAnswer) {
            var wrong = getWrongQuestions();
            var exists = null;
            for (var i = 0; i < wrong.length; i++) {
                if (wrong[i].text === question.text) { exists = wrong[i]; break; }
            }
            if (exists) {
                exists.errorCount = (exists.errorCount || 1) + 1;
                exists.lastWrongAt = new Date().toISOString();
                exists.userAnswer = userAnswer;
                exists.mastered = false;
            } else {
                wrong.unshift({
                    id: Date.now(),
                    text: question.text,
                    question: {
                        numberA: question.numberA,
                        numberB: question.numberB,
                        operator: question.operator
                    },
                    correctAnswer: question.answer,
                    userAnswer: userAnswer,
                    errorCount: 1,
                    createdAt: new Date().toISOString(),
                    lastWrongAt: new Date().toISOString(),
                    mastered: false
                });
            }
            saveWrongQuestions(wrong);
        }
        
        function markAsMastered(id) {
            var wrong = getWrongQuestions();
            for (var i = 0; i < wrong.length; i++) {
                if (wrong[i].id === id) {
                    wrong[i].mastered = true;
                    wrong[i].masteredAt = new Date().toISOString();
                    break;
                }
            }
            saveWrongQuestions(wrong);
            renderNotebook();
        }
        
        function deleteWrongQuestion(id) {
            var wrong = getWrongQuestions().filter(function(w) { return w.id !== id; });
            saveWrongQuestions(wrong);
            renderNotebook();
        }
        
        function clearNotebook() {
            if (confirm('⚠️ 确定要清空错题本吗？')) {
                saveWrongQuestions([]);
                renderNotebook();
            }
        }
        
        function updateNotebookBadge() {
            var wrong = getWrongQuestions();
            var unmastered = 0;
            for (var i = 0; i < wrong.length; i++) {
                if (!wrong[i].mastered) unmastered++;
            }
            $('notebookBadge').textContent = unmastered > 0 ? unmastered : '';
        }
        
        function renderNotebook() {
            var wrong = getWrongQuestions();
            var total = wrong.length;
            var mastered = 0;
            for (var i = 0; i < wrong.length; i++) {
                if (wrong[i].mastered) mastered++;
            }
            var unmastered = total - mastered;
            
            $('notebookStats').innerHTML = 
                '<div class="notebook-stat">📊 总错题<strong>' + total + '</strong></div>' +
                '<div class="notebook-stat">✅ 已掌握<strong>' + mastered + '</strong></div>' +
                '<div class="notebook-stat">❗ 待复习<strong>' + unmastered + '</strong></div>';
            
            if (total === 0) {
                $('wrongList').innerHTML = '<div class="empty-state"><div class="emoji">🎉</div><h3>错题本是空的！</h3><p>做错的题会自动加入这里</p></div>';
                return;
            }
            
            wrong.sort(function(a, b) {
                if (a.mastered !== b.mastered) return a.mastered ? 1 : -1;
                return new Date(b.lastWrongAt) - new Date(a.lastWrongAt);
            });
            
            var html = '';
            for (var i = 0; i < wrong.length; i++) {
                var item = wrong[i];
                var masteredClass = item.mastered ? ' mastered' : '';
                var masteredBadge = item.mastered ? '✅ 已掌握' : '· 错了 ' + item.errorCount + ' 次 · ' + formatTime(item.lastWrongAt);
                var masterBtn = item.mastered ? '' : '<button class="btn-master" data-action="master" data-id="' + item.id + '">✓ 掌握</button>';
                
                html += '<div class="wrong-item' + masteredClass + '">' +
                    '<div style="flex:1; min-width:200px;">' +
                    '<div class="wrong-question">' + item.text.replace('?', '') + ' <span style="color:#00b894;">' + item.correctAnswer + '</span></div>' +
                    '<div class="wrong-info">你的答案：<span style="color:#d63031;text-decoration:line-through;">' + item.userAnswer + '</span> ' + masteredBadge + '</div>' +
                    '</div>' +
                    '<div class="wrong-actions">' + masterBtn +
                    '<button class="btn-delete" data-action="delete" data-id="' + item.id + '">🗑️</button>' +
                    '</div>' +
                    '</div>';
            }
            $('wrongList').innerHTML = html;
        }
        
        function openNotebook() {
            showPage('notebookArea');
            renderNotebook();
        }
        
        function goHome() {
            showPage('settings');
        }
        
        // ============ 输入验证 ============
        
        function validateQuestionCount(input) {
            var value = input.value.replace(/[^\d]/g, '');
            if (value.length > 4) value = value.substring(0, 4);
            var num = parseInt(value) || 0;
            if (num > CONFIG.MAX_QUESTIONS) {
                num = CONFIG.MAX_QUESTIONS;
                showToast('⚠️ 最多只能做 ' + CONFIG.MAX_QUESTIONS + ' 题哦！', 'warn');
            }
            if (num < CONFIG.MIN_QUESTIONS && value !== '') {
                num = CONFIG.MIN_QUESTIONS;
            }
            input.value = num > 0 ? num : '';
            updateCountHint(num);
        }
        
        function updateCountHint(num) {
            var hint = $('countHint');
            if (!hint) return;
            if (num >= 40) {
                hint.textContent = '(会做很久哦，' + num + '题)';
                hint.className = 'count-hint warn';
            } else {
                hint.textContent = '(1-50题)';
                hint.className = 'count-hint';
            }
        }
        
        function safeGetQuestionCount() {
            var input = $('questionCount');
            var value = parseInt(input.value);
            if (isNaN(value) || value < CONFIG.MIN_QUESTIONS) {
                showToast('⚠️ 题数最少 ' + CONFIG.MIN_QUESTIONS + ' 题', 'warn');
                input.value = CONFIG.MIN_QUESTIONS;
                return CONFIG.MIN_QUESTIONS;
            }
            if (value > CONFIG.MAX_QUESTIONS) {
                showToast('⚠️ 最多只能做 ' + CONFIG.MAX_QUESTIONS + ' 题！', 'warn');
                input.value = CONFIG.MAX_QUESTIONS;
                return CONFIG.MAX_QUESTIONS;
            }
            return value;
        }
        
        function setQuestionCount(count) {
            $('questionCount').value = count;
            updateCountHint(count);
            playClickSound();
        }
        
        // ============ 出题 ============
        
        function generateAddition() {
            var a = Math.floor(Math.random() * 23);
            var b = Math.floor(Math.random() * (23 - a));
            return { text: a + ' + ' + b + ' = ?', answer: a + b, numberA: a, numberB: b, operator: '+' };
        }
        
        function generateSubtraction() {
            var a = Math.floor(Math.random() * 22) + 1;
            var b = Math.floor(Math.random() * (a + 1));
            return { text: a + ' - ' + b + ' = ?', answer: a - b, numberA: a, numberB: b, operator: '-' };
        }
        
        function generateQuestion() {
            if (gameState.type === 'add') return generateAddition();
            if (gameState.type === 'sub') return generateSubtraction();
            return Math.random() < 0.5 ? generateAddition() : generateSubtraction();
        }
        
        function startGame() {
            try {
                playClickSound();
                gameState.totalCount = safeGetQuestionCount();
                gameState.currentIndex = 0;
                gameState.correctCount = 0;
                gameState.questions = [];
                gameState.startTime = new Date();
                gameState.isReviewMode = false;
                
                for (var i = 0; i < gameState.totalCount; i++) {
                    gameState.questions.push(generateQuestion());
                }
                
                showPage('questionArea');
                showQuestion();
            } catch(e) {
                alert('启动失败：' + e.message);
            }
        }
        
        function startReviewMode() {
            try {
                playClickSound();
                var wrong = getWrongQuestions().filter(function(w) { return !w.mastered; });
                if (wrong.length === 0) {
                    alert('🎉 错题本是空的！先去练习吧！');
                    return;
                }
                
                gameState.totalCount = wrong.length;
                gameState.currentIndex = 0;
                gameState.correctCount = 0;
                gameState.questions = wrong.map(function(w) {
                    return {
                        text: w.text,
                        answer: w.correctAnswer,
                        numberA: w.question.numberA,
                        numberB: w.question.numberB,
                        operator: w.question.operator,
                        wrongId: w.id
                    };
                });
                gameState.startTime = new Date();
                gameState.isReviewMode = true;
                
                showPage('questionArea');
                showQuestion();
            } catch(e) {
                alert('错题练习启动失败：' + e.message);
            }
        }
        
        // ✅ 阻止输入负号、科学计数法等无效字符(禁止输入负号,减号和无效字符)
        function blockInvalidKeys(e) {
            // 阻止输入 -、+、e、E、. 这些字符
            if (e.key === '-' || e.key === '+' || e.key === 'e' || e.key === 'E' || 
                e.key === '.' || e.key === ',' || e.key === ' ') {
                e.preventDefault();
                return false;
            }
            return true;
        }
        
        // ✅ 清理答案（处理粘贴、自动填充等）
        function sanitizeAnswer(input) {
            // 移除非数字字符（包括 -、+、.、e 等）
            var value = input.value.replace(/[^\d]/g, '');
            // 限制最大 2 位数（小学1年级答案最大 44）
            if (value.length > 2) {
                value = value.substring(0, 2);
            }
            //input.value = value;
            // 限制范围
            //var num = parseInt(value) || 0;
            var num = parseInt(value);
            if (num > 44) {
                num = 44;
                showToast('⚠️ 答案最大是 44 哦！', 'warn');
                feedback.textContent = '⚠️ 数字太大了！';
            }
            
            // 更新输入框
            //if (input.value !== String(num)) {
                //input.value = num;
            //}
            
            if (isNaN(input.value)) {
                feedback.textContent = '⚠️ 请输入一个数字！';
                feedback.className = 'feedback wrong';
                playWrongSound();
                return;
            } else {
                if (input.value !== String(num)) {
                    //alert(num) 
                    //input.value = num; //..★TODO
                }
            }
        }
        
        // ✅ 处理粘贴事件
        function handlePaste(e) {
            e.preventDefault();
            var paste = (e.clipboardData || window.clipboardData).getData('text');
            var cleanNum = paste.replace(/[^\d]/g, '').substring(0, 2);
            
            var input = e.target;
            input.value = cleanNum;
            sanitizeAnswer(input);
        }
        
        function showQuestion() {
            var q = gameState.questions[gameState.currentIndex];
            gameState.currentAnswer = q.answer;
            gameState.currentQuestionData = q;
            
            var prefix = gameState.isReviewMode ? '📖 错题复习 ' : '';
            $('questionNumber').textContent = prefix + '第 ' + (gameState.currentIndex + 1) + ' / ' + gameState.totalCount + ' 题';
            // パーセンテージの計算
            const percentage = ((gameState.currentIndex + 1) / gameState.totalCount) * 100;
            // バーの幅を書き換え
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            //$('questionText').innerHTML = q.text.replace('?', '<input type="number" id="answerInput" class="answer-input" autofocus>');
            //var maxAnswer = gameState.type === 'sub' ? 22 : 44;
            //$('questionText').innerHTML = q.text.replace('?', '<input type="number" id="answerInput" class="answer-input" min="0" max="' + maxAnswer + '" autofocus>');
            // ✅ 关键修改：限制 min=0 max=答案范围
            var minAnswer = 0;
            var maxAnswer = 44;  // 设置一个合理的最大值
            var stepNum = 1;
            
            $('questionText').innerHTML = q.text.replace('?', 
                '<input type="number" id="answerInput" class="answer-input" ' +
                'min="' + minAnswer + '" max="' + maxAnswer + '" step="' + stepNum + '" ' +
                'inputmode="numeric" ' +
                'pattern="[0-9]*" ' +
                'onkeydown="return blockInvalidKeys(event)" ' +
                'oninput="sanitizeAnswer(this)" ' +
                'onpaste="handlePaste(event)" ' +
                'autocomplete="off" autocorrect="off" autocapitalize="off" ' +
                'spellcheck="false" autofocus>'
            );

        function submitAnswer() {
            var input = $('answerInput');
            if (!input) return;
            
            // ✅ 最后再清理一次
            sanitizeAnswer(input);
            
            var userAnswer = parseInt(input.value);
            var feedback = $('feedback');
            var q = gameState.currentQuestionData;
            
            // 验证是否为空
            /**
            if (input.value === '' || isNaN(userAnswer)) {
                feedback.textContent = '⚠️ 请输入数字！';
                feedback.className = 'feedback wrong';
                playWrongSound();
                return;
            }
            */
            
            if (isNaN(userAnswer)) {
                feedback.textContent = '⚠️ 请输入一个数字！';
                feedback.className = 'feedback wrong';
                playWrongSound();
                return;
            }
            
            // ✅ 验证是否为负数(检查负数)
            if (userAnswer < 0) {
                feedback.textContent = '⚠️ 答案不能是负数哦！';
                feedback.className = 'feedback wrong';
                playWrongSound();
                // 自动重置为 0
                // 自动重置,清空
                setTimeout(function() {
                    //input.value = 0;
                    input.value = '';
                    feedback.textContent = '';
                    //feedback.className = 'feedback';
                    input.focus();
                }, 1000);
                return;
            }
            
            // ✅ 验证是否过大(检查过大值)
            if (userAnswer > 44) {
                feedback.textContent = '⚠️ 答案太大了！';
                feedback.className = 'feedback wrong';
                playWrongSound();
                setTimeout(function() {
                    input.value = '';
                    feedback.textContent = '';
                    //feedback.className = 'feedback';
                    input.focus();
                }, 1000);
                return;
            }
            
            if (userAnswer === gameState.currentAnswer) {
                gameState.correctCount++;
                feedback.textContent = '🎉 答对啦！';
                feedback.className = 'feedback correct';
                playCorrectSound();
                if (gameState.isReviewMode && q.wrongId) {
                    setTimeout(function() { markAsMasteredSilent(q.wrongId); }, 800);
                }
            } else {
                feedback.textContent = '❌ 答错了，正确答案是 ' + gameState.currentAnswer;
                feedback.className = 'feedback wrong';
                playWrongSound();
                addWrongQuestion(q, userAnswer);
            }
            
            input.disabled = true;
            $('submitBtn').disabled = true;
            
            setTimeout(function() {
                gameState.currentIndex++;
                if (gameState.currentIndex < gameState.totalCount) {
                    $('submitBtn').disabled = false;
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }
        
        function markAsMasteredSilent(id) {
            var wrong = getWrongQuestions();
            for (var i = 0; i < wrong.length; i++) {
                if (wrong[i].id === id) {
                    wrong[i].mastered = true;
                    wrong[i].masteredAt = new Date().toISOString();
                    break;
                }
            }
            saveWrongQuestions(wrong);
        }
        
        function showResult() {
            var rate = (gameState.correctCount / gameState.totalCount * 100).toFixed(1);
            var elapsed = Math.floor((new Date() - gameState.startTime) / 1000);
            var minutes = Math.floor(elapsed / 60);
            var seconds = elapsed % 60;
            
            var evaluation = '';
            if (rate == 100) evaluation = '🏆 满分！你太厉害了！';
            else if (rate >= 90) evaluation = '🌟 太厉害了！你是数学小天才！';
            else if (rate >= 70) evaluation = '👍 表现不错，继续加油！';
            else if (rate >= 50) evaluation = '💪 还需努力，多练习就会进步！';
            else evaluation = '📖 别灰心，做错的题可以到错题本复习哦！';
            
            $('scoreCircle').textContent = rate + '%';
            $('stats').innerHTML = 
                '<div class="stat-item"><span>📝 总题数</span><strong>' + gameState.totalCount + '</strong></div>' +
                '<div class="stat-item"><span>✅ 答对</span><strong style="color:#00b894">' + gameState.correctCount + '</strong></div>' +

                '<div class="stat-item"><span>⏱️ 用时</span><strong>' + minutes + '分' + seconds + '秒</strong></div>';
            $('evaluation').textContent = evaluation;
            
            showPage('resultArea');
            playCompleteSound();
        }

        function generateWrongQuestionsText() {
            var wrong = getWrongQuestions();
            if (wrong.length === 0) return '🎉 错题本是空的！';
            
            var sorted = wrong.slice().sort(function(a, b) {
                if (a.mastered !== b.mastered) return a.mastered ? 1 : -1;
                return new Date(b.lastWrongAt) - new Date(a.lastWrongAt);
            });
            
            var today = new Date().toLocaleDateString('zh-CN');
            var text = `╔═════════════════════════════════╗\n`;
            text += `║   📚 我的错题本  (${today})     ║\n`;
            text += `╚═════════════════════════════════╝\n\n`;
            text += '📊 总计：' + sorted.length + ' 题\n';
            text += '❗ 待复习：' + sorted.filter(function(w) { return !w.mastered; }).length + ' 题\n';
            text += '✅ 已掌握：' + sorted.filter(function(w) { return w.mastered; }).length + ' 题\n\n';
            text += '────────────────────────────────────────\n\n';
            
            for (var i = 0; i < sorted.length; i++) {
                var item = sorted[i];
                var status = item.mastered ? '[✅ 已掌握]' : '[❗ 待复习]';
                text += (i + 1) + '. ' + status + ' ' + item.text.replace('?', '' + item.correctAnswer) + '\n';
                text += '   你的答案：' + item.userAnswer + ' | 错了 ' + item.errorCount + ' 次 | ' + formatTime(item.lastWrongAt) + '\n\n';
            }
            text += '────────────────────────────────────────\n';
            text += '🌟 加油小朋友，错题越练越少！\n';

        function generateQRCode() {
            var container = $('qrCodeContainer');
            var wrong = getWrongQuestions();
            
            container.innerHTML = '<div class="loading"></div><p>生成中...</p>';
            
            // 完整文本（用于预览框）
            var fullText = '📚 我的错题本\n';
            fullText += '生成时间：' + new Date().toLocaleString('zh-CN') + '\n';
            fullText += '总计：' + wrong.length + ' 题\n';
            fullText += '─────────────────────────\n\n';
            
            for (var i = 0; i < wrong.length; i++) {
                var item = wrong[i];
                var status = item.mastered ? '✅' : '❗';
                
                // ✅ 关键修复：正确处理题目文本
                // item.text 可能是 "21 + 1 = ?" 或 "21 + 1 =? " 
                // 统一处理：把 "?" 替换为空，然后拼接答案
                var cleanText = item.text.replace(/\?\s*/g, '').trim();
                // 去掉尾部可能多余的 "="
                if (cleanText.endsWith('=')) {
                    cleanText = cleanText.slice(0, -1).trim();
                }
                
                fullText += (i+1) + '. ' + status + ' ' + cleanText + ' = ' + item.correctAnswer + '\n';

        // 解码二维码内容
        function decodeBase64Text(base64) {
            return decodeURIComponent(escape(atob(base64)));
        }
        // eg
        //var decoded = decodeBase64Text("8J TmumUmemimOacrCAy6aKYCjEuICA0ICsgMTEgPSAxNSAgCjIuICAxOSArIDMgPSAyMiAgCg==");
        //console.log(decoded);
        // 输出就是：
        //📚错题本 2题
        //1. 4 + 11 = 15
        //2. 19 + 3 = 22
        
        function generateQrCodeUrl(wrong) {
            if (!wrong || wrong.length === 0) return '';
            
            // 1. 构建紧凑文本
            // 注意：这里严格使用 \n 作为换行符，不要使用 \r\n
            var compactText = '📚错题本 ' + wrong.length + '题\n';
            
            for (var i = 0; i < wrong.length; i++) {
                var item = wrong[i];
                
                // 清理题目文本
                var cleanText = item.text.replace(/\?\s*/g, '').trim();
                if (cleanText.endsWith('=')) {
                    cleanText = cleanText.slice(0, -1).trim();
                }
                
                // 格式化每一行：序号. 题目 = 答案
                // 建议：去掉末尾多余的空格，保持整洁
                compactText += (i + 1) + '. ' + cleanText + '=' + item.correctAnswer + '\n';
            }
            
            // 2. 调试：在控制台打印原始文本，确认换行符存在
            console.log('--- 原始文本内容 ---');
            console.log(compactText);
            console.log('------------------');
            
            // 3. 编码并生成 URL
            // encodeURIComponent 会将 \n 转换为 %0A
            var encodedData = encodeURIComponent(compactText);
            
            // 构造 API URL
            var qrApiUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + 
                           encodedData + 
                           '&color=e17055&margin=10';
            
            return qrApiUrl;
        }
        
        // 使用示例：
        // var url = generateQrCodeUrl(wrongList);
        // document.getElementById('qrImg').src = url;
        
        
        function renderQrCodeLocal(wrong, containerId) {
            if (!wrong || wrong.length === 0) return;
            
            // 1. 构建文本（与之前相同）
            var compactText = '📚错题本 ' + wrong.length + '题\n';
            for (var i = 0; i < wrong.length; i++) {
                var item = wrong[i];
                var cleanText = item.text.replace(/\?\s*/g, '').trim();
                if (cleanText.endsWith('=')) {
                    cleanText = cleanText.slice(0, -1).trim();
                }
                // 确保每行末尾只有 \n
                compactText += (i + 1) + '. ' + cleanText + '=' + item.correctAnswer + '\n';
            }
            
            // 2. 清空容器
            var container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // 3. 使用 QRCode.js 生成
            // 这个库会直接处理文本中的 \n，生成的二维码包含标准换行信息
            new QRCode(container, {
                text: compactText,
                width: 300,
                height: 300,
                colorDark : "#e17055", // 您的主题色
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H // 高容错率，防止因内容多导致难扫
            });
            
            console.log('二维码已本地生成，文本内容：', compactText);
        }
        
        // 使用示例：
        // 假设 HTML 中有 <div id="qrcode-container"></div>
        // renderQrCodeLocal(wrongList, 'qrcode-container');
        
        function copyQRText() {
            var ta = $('qrTextContent');
            ta.select();
            ta.setSelectionRange(0, 99999);
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(ta.value);
                } else {
                    document.execCommand('copy');
                }
                showToast('✅ 错题内容已复制！');
            } catch(e) {
                showToast('❌ 复制失败，请手动选择', 'error');
            }
        }
        
        function downloadQRCode() {
            var img = document.querySelector('#qrCodeContainer img');
            if (!img) return;
            var a = document.createElement('a');
            a.href = img.src;
            a.download = '错题本二维码_' + Date.now() + '.png';
            a.target = '_blank';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            showToast('💾 二维码已下载！');
        }
        
        // ============ 云同步 ============
        
        function openCloudSync() {
            playClickSound();
            closeAllModals();
            var userId = null;
            try { userId = localStorage.getItem('cloud_user_id'); } catch(e) {}
            
            if (userId) {
                $('cloudUserName').textContent = userId;
                $('cloudLoginArea').classList.add('hidden');
                $('cloudSyncArea').classList.remove('hidden');
            } else {
                $('cloudLoginArea').classList.remove('hidden');
                $('cloudSyncArea').classList.add('hidden');
            }
            $('cloudModal').classList.remove('hidden');
        }
        
        function cloudLogin() {
            var userId = $('cloudUserId').value.trim();
            if (!userId) { showToast('⚠️ 请输入用户ID', 'warn'); return; }
            try { localStorage.setItem('cloud_user_id', userId); } catch(e) {}
            showToast('✅ 登录成功！');
            openCloudSync();
        }
        
        function cloudLogout() {
            if (confirm('确定要退出登录吗？')) {
                try { localStorage.removeItem('cloud_user_id'); } catch(e) {}
                openCloudSync();
            }
        }
        
        function cloudUpload() {
            var userId = null;
            try { userId = localStorage.getItem('cloud_user_id'); } catch(e) {}
            if (!userId) return;
            
            showToast('⏳ 上传中...');
            setTimeout(function() {
                try {
                    localStorage.setItem('cloud_' + userId, JSON.stringify({
                        userId: userId,
                        timestamp: Date.now(),
                        questions: getWrongQuestions()
                    }));
                    showToast('✅ 上传成功！（演示模式）');
                } catch(e) { showToast('❌ 上传失败', 'error'); }
            }, 1000);
        }
        
        function cloudDownload() {
            var userId = null;
            try { userId = localStorage.getItem('cloud_user_id'); } catch(e) {}
            if (!userId) return;
            
            var cloudData = null;
            try { cloudData = localStorage.getItem('cloud_' + userId); } catch(e) {}
            if (!cloudData) { showToast('⚠️ 云端没有数据', 'warn'); return; }
            if (!confirm('下载会覆盖本地错题本，确定吗？')) return;
            
            try {
                var data = JSON.parse(cloudData);
                saveWrongQuestions(data.questions);
                renderNotebook();
                showToast('✅ 下载成功！');
            } catch(e) { showToast('❌ 下载失败', 'error'); }
        }
        
        // ============ 备份恢复 ============
        
        function exportAllData() {
            var data = {
                version: 1,
                exportDate: new Date().toISOString(),
                wrongQuestions: getWrongQuestions()
            };
            var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = '数学练习备份_' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('💾 备份文件已下载！');
            closeAllModals();
        }
        
        function importAllData() {
            closeAllModals();
            $('importFile').click();
        }
        
        function handleImport(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var data = JSON.parse(e.target.result);
                    if (!data.wrongQuestions) throw new Error('文件格式不正确');
                    if (!confirm('找到 ' + data.wrongQuestions.length + ' 条错题记录，是否恢复？')) return;
                    saveWrongQuestions(data.wrongQuestions);
                    renderNotebook();
                    showToast('✅ 数据恢复成功！');
                } catch(err) {
                    showToast('❌ 文件读取失败：' + err.message, 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }
        
        function clearAllData() {
            if (!confirm('⚠️ 确定要清除所有数据吗？')) return;
            if (!confirm('再次确认：真的要清除所有数据吗？')) return;
            try {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem('sound_enabled');
                localStorage.removeItem('export_theme');
                localStorage.removeItem('cloud_user_id');
                var keys = [];
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    if (k && k.indexOf('cloud_') === 0) keys.push(k);
                }
                for (var j = 0; j < keys.length; j++) localStorage.removeItem(keys[j]);
            } catch(e) {}
            closeAllModals();
            location.reload();
        }
        
        function openSettings() {
            playClickSound();
            $('settingsModal').classList.remove('hidden');
        }
        
        // ============ 事件绑定 ============
        
        function bindEvents() {
            // 题型选择
            var typeBtns = document.querySelectorAll('.btn-option[data-type]');
            for (var i = 0; i < typeBtns.length; i++) {
                (function(btn) {
                    btn.onclick = function() {
                        playClickSound();
                        gameState.type = btn.dataset.type;
                        for (var j = 0; j < typeBtns.length; j++) typeBtns[j].classList.remove('active');
                        btn.classList.add('active');
                    };
                })(typeBtns[i]);
            }
            
            // 题数输入
            $('questionCount').oninput = function() { validateQuestionCount(this); };
            
            // 快捷题数
            var qcBtns = document.querySelectorAll('.quick-count button');
            for (var i = 0; i < qcBtns.length; i++) {
                (function(btn) {
                    btn.onclick = function() { 
                        setQuestionCount(parseInt(btn.textContent)); 
                        for (var j = 0; j < qcBtns.length; j++) qcBtns[j].classList.remove('active');
                        btn.classList.add('active');
                    };
                })(qcBtns[i]);
            }
            
            // 主要按钮
            $('startBtn').onclick = startGame;
            $('reviewBtn').onclick = startReviewMode;
            $('openNotebookBtn').onclick = openNotebook;
            $('openNotebookFromResult').onclick = openNotebook;
            $('submitBtn').onclick = submitAnswer;
            $('retryBtn').onclick = startGame;
            
            // 返回按钮
            $('backFromQuestion').onclick = function() { playClickSound(); goHome(); };
            $('backFromResult').onclick = function() { playClickSound(); goHome(); };
            $('backFromNotebook').onclick = function() { playClickSound(); goHome(); };
            $('backFromNotebookBottom').onclick = function() { playClickSound(); goHome(); };
            
            // 错题本操作
            $('clearNotebookBtn').onclick = clearNotebook;
            $('copyBtn').onclick = copyToClipboard;
            $('imageBtn').onclick = showExportImageModal;
            $('pdfBtn').onclick = exportAsPDF;
            $('txtBtn').onclick = exportAsTxt;
            $('emailBtn').onclick = showEmailModal;
            $('qrBtn').onclick = showQRCodeModal;
            
            // 错题列表（事件委托）
            $('wrongList').onclick = function(e) {
                var target = e.target;
                if (target.dataset.action === 'master') {
                    playClickSound();
                    markAsMastered(parseInt(target.dataset.id));
                } else if (target.dataset.action === 'delete') {
                    if (confirm('确定删除这道错题？')) {
                        playClickSound();
                        deleteWrongQuestion(parseInt(target.dataset.id));
                    }
                }
            };
            
            // 顶部按钮
            $('soundToggle').onclick = toggleSound;
            $('notebookBtn').onclick = openNotebook;
            $('settingsBtn').onclick = openSettings;
            
            // 模态框按钮
            $('cancelEmail').onclick = closeAllModals;
            $('sendEmailBtn').onclick = sendEmail;
            $('closeQR').onclick = closeAllModals;
            $('copyQRBtn').onclick = copyQRText;
            $('downloadQRBtn').onclick = downloadQRCode;
            $('cancelTheme').onclick = closeAllModals;
            $('confirmTheme').onclick = confirmTheme;
            $('cancelCloud').onclick = closeAllModals;
            $('cloudLoginBtn').onclick = cloudLogin;
            $('cloudUploadBtn').onclick = cloudUpload;
            $('cloudDownloadBtn').onclick = cloudDownload;
            $('cloudLogoutBtn').onclick = cloudLogout;
            $('openCloudBtn').onclick = openCloudSync;
            $('openThemeBtn').onclick = showExportImageModal;
            $('exportAllBtn').onclick = exportAllData;
            $('importAllBtn').onclick = importAllData;
            $('clearAllBtn').onclick = clearAllData;
            $('closeSettings').onclick = closeAllModals;
            
            // 点击模态框背景关闭
            var modals = document.querySelectorAll('.modal');
            for (var i = 0; i < modals.length; i++) {
                (function(modal) {
                    modal.onclick = function(e) {
                        if (e.target === modal) closeAllModals();
                    };
                })(modals[i]);
            }
            
            // 主题选项（事件委托）
            $('themeGrid').onclick = function(e) {
                if (e.target.dataset && e.target.dataset.theme) {
                    selectTheme(e.target.dataset.theme);
                }
            };
            
            // 导入文件
            $('importFile').onchange = handleImport;
            
            // ESC 关闭模态框
            document.onkeydown = function(e) {
                if (e.key === 'Escape') closeAllModals();
            };
        }
        
        // ============ 启动 ============
        
        // 恢复设置
        try {
            var savedSound = localStorage.getItem('sound_enabled');
            if (savedSound === 'false') {
                soundEnabled = false;
                $('soundToggle').textContent = '🔇';
                $('soundToggle').classList.add('muted');
            }
            var savedTheme = localStorage.getItem('export_theme');
            if (savedTheme && CONFIG.THEMES[savedTheme]) {
                currentTheme = savedTheme;
            }
        } catch(e) {}
        
        // 绑定事件
        bindEvents();
        
        // 更新角标
        updateNotebookBadge();
        
        // 显示主菜单
        showPage('settings');
        
        //console.log('✅ 应用已启动');
