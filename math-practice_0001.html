<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>🎈 数学乐园</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#ffeaa7,#fab1a0 50%,#a8e6cf);overflow:hidden;user-select:none}
#app{position:relative;width:100%;height:100%;max-width:480px;margin:0 auto;
  background:#fffbea;box-shadow:0 0 30px rgba(0,0,0,.15);overflow:hidden}
.screen{position:absolute;inset:0;display:none;flex-direction:column;animation:fade .4s}
.screen.on{display:flex}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(400px) rotate(720deg);opacity:0}}

/* 顶栏 */
.topbar{display:flex;align-items:center;padding:10px 12px;
  background:linear-gradient(90deg,#6c5ce7,#a29bfe);color:#fff;font-weight:bold;
  box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:10;flex-shrink:0;gap:8px}
.topbar .back{font-size:24px;cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0}
.topbar .back:active{opacity:.6}
.topbar .title{font-size:16px;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .icons{display:flex;gap:6px;font-size:12px;flex-shrink:0}
.topbar .icons span{background:rgba(255,255,255,.2);padding:3px 7px;border-radius:10px;white-space:nowrap}

/* 首页 */
.home{align-items:center;justify-content:flex-start;padding:18px;text-align:center;
  background:linear-gradient(180deg,#74b9ff,#a29bfe 60%,#fd79a8);overflow-y:auto}
.home h1{font-size:30px;color:#fff;text-shadow:3px 3px 0 #6c5ce7;margin:6px 0;letter-spacing:2px}
.home .mascot{font-size:60px;animation:float 3s infinite;margin-top:14px}
.home .btn{display:block;width:80%;max-width:280px;margin:8px auto;padding:12px;
  font-size:17px;font-weight:bold;color:#fff;border:none;border-radius:26px;cursor:pointer;
  box-shadow:0 5px 0 rgba(0,0,0,.15),0 8px 20px rgba(0,0,0,.1);transition:all .15s;font-family:inherit}
.home .btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.15)}
.btn-1{background:linear-gradient(180deg,#ff7675,#d63031)}
.btn-2{background:linear-gradient(180deg,#fdcb6e,#e17055)}
.btn-3{background:linear-gradient(180deg,#00b894,#00cec9)}
.btn-4{background:linear-gradient(180deg,#a29bfe,#6c5ce7)}
.btn-5{background:linear-gradient(180deg,#fd79a8,#e84393)}
.home .stats{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.home .stats .chip{background:rgba(255,255,255,.85);padding:5px 10px;border-radius:12px;
  font-size:12px;color:#2d3436;font-weight:bold}

/* 地图 */
.worlds{flex:1;overflow-y:auto;padding:12px;background:linear-gradient(180deg,#ffeaa7,#fab1a0)}
.world{background:rgba(255,255,255,.7);border-radius:18px;padding:12px;margin-bottom:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.08)}
.world h2{color:#6c5ce7;margin-bottom:10px;font-size:16px}
.levels{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.lvl{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;font-weight:bold;
  background:linear-gradient(135deg,#fff,#ffeaa7);box-shadow:0 4px 0 #fdcb6e;
  transition:all .15s;position:relative}
.lvl:active{transform:translateY(2px);box-shadow:0 1px 0 #fdcb6e}
.lvl.locked{background:linear-gradient(135deg,#dfe6e9,#b2bec3);color:#636e72;cursor:not-allowed;box-shadow:0 4px 0 #636e72}
.lvl .num{font-size:20px;color:#d63031}
.lvl .stars{color:#fdcb6e;font-size:12px;margin-top:2px}
.lvl .lname{font-size:10px;color:#636e72;margin-top:2px;text-align:center;padding:0 2px}

/* 游戏 */
.game{flex:1;display:flex;flex-direction:column;background:#fffbea}
.game-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:12px}
.question{background:#fff;border-radius:20px;padding:18px 14px;width:100%;
  box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center}
.q-title{font-size:12px;color:#636e72;margin-bottom:10px}
.q-main{color:#2d3436;font-weight:bold;line-height:1.6}
.hint{font-size:12px;color:#74b9ff;background:#e0f3ff;padding:6px 10px;
  border-radius:10px;margin-top:10px;display:inline-block;line-height:1.5}

/* ===== 通用方格 ===== */
.box{display:inline-flex;align-items:center;justify-content:center;
  border:3px dashed #74b9ff;border-radius:10px;background:#f0f8ff;
  color:#0984e3;font-weight:bold;vertical-align:middle;cursor:pointer;
  transition:all .15s;margin:0 2px;min-width:50px;height:50px;padding:0 6px;
  font-size:24px;line-height:1;font-family:inherit}
.box.empty{color:transparent}
.box.active{border-color:#fdcb6e;border-style:solid;background:#fff8e1;
  box-shadow:0 0 0 3px rgba(253,203,110,.3);color:#d63031}
.box.filled{border-style:solid;border-color:#00b894;color:#d63031;background:#e8f8f5}
.box.wrong{border-color:#d63031;background:#ffe8e8;animation:shake .4s}
/* 两位数方格 */
.box.d2{min-width:78px}
/* 符号框 */
.op{display:inline-flex;align-items:center;justify-content:center;
  border:3px solid #a29bfe;border-radius:10px;background:#f3f0ff;
  color:#6c5ce7;font-weight:bold;vertical-align:middle;cursor:pointer;
  min-width:44px;height:44px;padding:0 4px;font-size:22px;margin:0 2px;
  transition:all .15s;font-family:inherit}
.op.empty{color:transparent}
.op.active{border-color:#fdcb6e;border-style:dashed;background:#fff8e1;color:#d63031}
.op.filled{border-style:solid;background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;border-color:#4834d4}

/* ===== 题目专用样式 ===== */

/* 相邻数和：横向均匀 */
.neighbor-line{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;margin-top:14px}
.neighbor-line .known{font-size:28px;font-weight:bold;color:#2d3436;min-width:36px;text-align:center}
.neighbor-line .box{width:50px;min-width:50px}

/* 凑十法：拆分数对齐 */
.make10-split{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;font-size:18px;flex-wrap:wrap}
.make10-row{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 0;font-size:18px;color:#0984e3;flex-wrap:wrap}
.make10-eq{color:#6c5ce7;font-weight:bold;margin:0 4px}
.make10-known{color:#2d3436;font-weight:bold;font-size:20px;min-width:24px;text-align:center}

/* 填符号：横向 */
.symbol-line{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:wrap;font-size:24px}
.symbol-line .known{min-width:32px;text-align:center}

/* 算式树：三角形结构 */
.tree-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px}
.tree-top{font-size:32px;font-weight:bold;color:#d63031}
.tree-arrows{font-size:20px;color:#6c5ce7;letter-spacing:30px}
.tree-children{display:flex;justify-content:space-around;width:100%;gap:20px;flex-wrap:wrap}
.tree-branch{display:flex;flex-direction:column;align-items:center;gap:6px}
.tree-branch .box{width:64px;min-width:64px;height:50px}
.tree-branch .ar{font-size:18px;color:#6c5ce7;letter-spacing:6px}
.tree-leafs{display:flex;gap:14px;align-items:center;font-size:24px;color:#2d3436}

/* 图形算式：图形 emoji 大字号 */
.shape-eq{font-size:22px;margin-bottom:8px}
.shape-emoji{font-size:42px;display:inline-block;margin:0 4px;vertical-align:middle}
.shape-answers{display:flex;justify-content:space-around;align-items:center;
  margin-top:14px;flex-wrap:wrap;gap:8px}
.shape-item{display:flex;align-items:center;gap:4px;font-size:18px}
.shape-item .box{width:64px;min-width:64px;height:50px}
.shape-list{text-align:left;padding:0 8px;font-size:17px;line-height:2;color:#0984e3}

/* 竖式方格：表格化对齐 */
.grid-table{display:inline-grid;grid-template-columns:auto auto auto auto auto;
  align-items:center;justify-items:center;gap:6px 4px;font-size:22px;
  font-weight:bold;margin:6px auto}
.grid-table .box{width:54px;min-width:54px;height:50px}
.grid-table .op-sym{color:#6c5ce7;font-size:24px;min-width:20px;text-align:center}
.grid-table .eq-sym{color:#6c5ce7;font-size:24px;min-width:20px;text-align:center}
.grid-table .known{color:#2d3436;font-size:24px;min-width:30px;text-align:center}
.grid-table .result{color:#d63031;font-size:24px;font-weight:bold}
.grid-table .vline{writing-mode:vertical-rl;border-left:3px solid #6c5ce7;
  height:60px;align-self:center;margin:0 4px}

/* 破十法 */
.break-row{display:flex;align-items:center;justify-content:center;gap:6px;
  margin:8px 0;font-size:18px;flex-wrap:wrap}
.break-row .box{height:44px;min-width:50px;font-size:20px}
.break-known{color:#2d3436;font-weight:bold;font-size:20px;min-width:24px;text-align:center}
.break-op{color:#6c5ce7;font-size:20px;margin:0 2px}

/* 键盘 */
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px;
  background:#fff;box-shadow:0 -4px 12px rgba(0,0,0,.05);flex-shrink:0}
.key{padding:12px 0;background:linear-gradient(180deg,#fff,#f1f2f6);border:none;
  border-radius:10px;font-size:20px;font-weight:bold;color:#2d3436;cursor:pointer;
  box-shadow:0 3px 0 #dfe6e9;transition:all .1s;font-family:inherit}
.key:active{transform:translateY(2px);box-shadow:0 1px 0 #dfe6e9;background:#ffeaa7}
.key.op{background:linear-gradient(180deg,#a29bfe,#6c5ce7);color:#fff;box-shadow:0 3px 0 #4834d4}
.key.del{background:linear-gradient(180deg,#ff7675,#d63031);color:#fff;box-shadow:0 3px 0 #a71d1d}
.key.ok{background:linear-gradient(180deg,#00b894,#00cec9);color:#fff;box-shadow:0 3px 0 #008a73}

/* 弹窗 */
.modal{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;
  align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.on{display:flex}
.modal-card{background:#fff;border-radius:20px;padding:22px 16px;text-align:center;
  max-width:300px;width:100%;animation:pop .4s}
.modal-card .emoji{font-size:50px;margin-bottom:6px}
.modal-card h3{color:#2d3436;margin-bottom:4px;font-size:18px}
.modal-card p{color:#636e72;margin-bottom:10px;font-size:13px}
.modal-card .stars-big{font-size:26px;color:#fdcb6e;margin:6px 0;letter-spacing:4px}
.modal-card .btn-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.modal-card button{padding:9px 14px;border:none;border-radius:18px;font-size:13px;
  font-weight:bold;color:#fff;cursor:pointer;font-family:inherit;
  box-shadow:0 3px 0 rgba(0,0,0,.2)}
.modal-card button.alt{background:linear-gradient(180deg,#00b894,#008a73);box-shadow:0 3px 0 #006657}
.modal-card button.home{background:linear-gradient(180deg,#fdcb6e,#e17055);box-shadow:0 3px 0 #b85540}
.modal-card button.main{background:linear-gradient(180deg,#6c5ce7,#4834d4);box-shadow:0 3px 0 #2d2188}
.confetti{position:absolute;width:10px;height:10px;pointer-events:none;animation:confetti 2s linear forwards}

/* 打卡统计 */
.checkin,.stats-page{padding:14px;flex:1;overflow-y:auto;background:#fffbea}
.streak-card{background:linear-gradient(135deg,#ff7675,#fd79a8);color:#fff;
  border-radius:14px;padding:12px;margin-bottom:10px;text-align:center}
.streak-card .num{font-size:40px;font-weight:bold;text-shadow:2px 2px 0 rgba(0,0,0,.2);line-height:1.1}
.calendar{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.calendar h3{color:#6c5ce7;margin-bottom:8px;text-align:center;font-size:15px}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;
  font-weight:bold;color:#6c5ce7;font-size:11px;text-align:center}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:6px;font-size:10px;background:#f1f2f6;color:#636e72}
.day.done{background:linear-gradient(135deg,#ffeaa7,#fdcb6e);color:#d63031;font-weight:bold}
.day.today{outline:2px solid #6c5ce7}
.stat-card{background:#fff;border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.stat-card h3{color:#6c5ce7;margin-bottom:6px;font-size:14px}
.bar{height:10px;background:#f1f2f6;border-radius:5px;overflow:hidden;margin:3px 0}
.bar-fill{height:100%;background:linear-gradient(90deg,#00b894,#00cec9);border-radius:5px;transition:width .6s}
.difficulty-badge{display:inline-block;padding:3px 8px;border-radius:10px;
  background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;font-size:11px;margin:2px;border:none;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="screen home on" id="home">
    <div class="mascot">🦊</div>
    <h1>数学乐园</h1>
    <p style="color:#fff;font-size:12px;margin-bottom:12px;text-shadow:1px 1px 0 rgba(0,0,0,.2)">方格填数大冒险</p>
    <button class="btn btn-1" onclick="App.go('worlds')">🎮 开始闯关</button>
    <button class="btn btn-2" onclick="App.go('checkin')">📅 每日打卡</button>
    <button class="btn btn-4" onclick="App.go('stats')">📊 学习报告</button>
    <button class="btn btn-3" onclick="App.go('ai')">🤖 AI 调难度</button>
    <div class="stats">
      <div class="chip">⭐ <b id="hStar">0</b></div>
      <div class="chip">🔥 <b id="hStreak">0</b>天</div>
      <div class="chip">🎯 Lv.<b id="hLevel">1</b></div>
    </div>
  </div>

  <div class="screen" id="worlds">
    <div class="topbar">
      <span class="back" onclick="App.go('home')">←</span>
      <span class="title">🗺️ 冒险地图</span>
      <span class="icons"><span>⭐ <b id="wStar">0</b></span></span>
    </div>
    <div class="worlds" id="worldList"></div>
  </div>

  <div class="screen" id="game">
    <div class="topbar">
      <span class="back" onclick="Game.quit()">←</span>
      <span class="title" id="gTitle">关卡</span>
      <span class="icons">
        <span>⭐ <b id="gStar">0</b></span>
        <span>⏱ <b id="gTime">0</b>″</span>
      </span>
    </div>
    <div class="game-body" id="gBody"></div>
    <div class="keypad" id="gKeys"></div>
  </div>

  <div class="screen" id="checkin">
    <div class="topbar">
      <span class="back" onclick="App.go('home')">←</span>
      <span class="title">📅 每日打卡</span>
    </div>
    <div class="checkin" id="cBody"></div>
  </div>

  <div class="screen" id="stats">
    <div class="topbar">
      <span class="back" onclick="App.go('home')">←</span>
      <span class="title">📊 学习报告</span>
    </div>
    <div class="stats-page" id="sBody"></div>
  </div>

  <div class="screen" id="ai">
    <div class="topbar">
      <span class="back" onclick="App.go('home')">←</span>
      <span class="title">🤖 AI 调难度</span>
    </div>
    <div class="stats-page" id="aBody"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card" id="modalCard"></div>
  </div>
</div>

<script>
/* ============ 数据 ============ */
const Store={key:'mathPark_v3',data:{stars:0,level:1,streak:0,lastCheck:'',
  checkDays:[],levels:{},stats:{correct:0,total:0,times:{},typeStats:{}},
  difficulty:{global:1,perType:{}},history:[]},
  load(){try{const d=localStorage.getItem(this.key);if(d)this.data=Object.assign(this.data,JSON.parse(d))}catch(e){}},
  save(){localStorage.setItem(this.key,JSON.stringify(this.data))}};
Store.load();

const WORLDS=[
  {id:'w1',name:'🌱 萌芽岛',levels:[
    {id:1,name:'相邻数和',type:'neighbor'},{id:2,name:'凑十法',type:'make10'},{id:3,name:'填符号',type:'symbol'}]},
  {id:'w2',name:'🌳 智慧森林',levels:[
    {id:4,name:'算式树',type:'tree'},{id:5,name:'图形算式',type:'shape'},{id:6,name:'竖式方格',type:'grid'}]},
  {id:'w3',name:'🚀 挑战王国',levels:[
    {id:7,name:'破十加',type:'break10_add'},{id:8,name:'破十减',type:'break10_sub'},{id:9,name:'终极挑战',type:'boss'}]}
];

const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function calc(ns,ops){let v=ns[0];for(let i=0;i<ops.length;i++)v=ops[i]==='+'?v+ns[i+1]:v-ns[i+1];return v}
function typeName(t){return{neighbor:'相邻数和',make10:'凑十法',symbol:'填符号',tree:'算式树',
  shape:'图形算式',grid:'竖式方格',break10_add:'破十加',break10_sub:'破十减',boss:'综合'}[t]||t}

/* ============ 题目生成器 ============ */
const Gen={
  // 1. 相邻数和
  neighbor(diff=1){
    const a=rand(2,4+diff*2);
    return {type:'neighbor',display:
      `<div style="font-size:22px;font-weight:bold">相邻五个数的和是 <span style="color:#d63031">${a*5+10}</span></div>
      <div class="neighbor-line">
        <span class="known">${a}</span>
        <b class="box empty" data-i="0"></b>
        <b class="box empty" data-i="1"></b>
        <b class="box empty" data-i="2"></b>
        <span class="known">${a+4}</span>
      </div>
      <div class="hint">💡 后面的数 = 前面的数 + 1</div>`,
      answer:[a+1,a+2,a+3]};
  },

  // 2. 凑十法（结果≥11）
  make10(diff=1){
    const a=rand(2,8),need=10-a,left=rand(1,9-need),b=need+left;
    return {type:'make10',display:
      `<div style="font-size:26px;font-weight:bold;line-height:1.8">
        <span class="make10-known">${a}</span>
        <span class="make10-eq">+</span>
        <span class="make10-known">${b}</span>
        <span class="make10-eq">=</span>
        <span class="make10-known" style="color:#d63031">${a+b}</span>
      </div>
      <div class="make10-split" style="font-size:18px;color:#636e72">
        把 <b style="color:#d63031">${b}</b> 分成
        <b class="box empty" data-i="0"></b> 和 <b class="box empty" data-i="1"></b>
      </div>
      <div class="make10-row">
        先算：<span class="make10-known">${a}</span> <span class="make10-eq">+</span>
        <b class="box empty" data-i="2"></b> <span class="make10-eq">=</span> 10
      </div>
      <div class="make10-row">
        再算：10 <span class="make10-eq">+</span>
        <b class="box empty" data-i="3"></b> <span class="make10-eq">=</span>
        <span class="make10-known" style="color:#d63031">${a+b}</span>
      </div>
      <div class="hint">💡 把第二个数拆开，让第一个数先凑成 10</div>`,
      answer:[need,left,need,left]};
  },

  // 3. 填符号
  symbol(diff=1){
    for(let i=0;i<60;i++){
      const ns=Array.from({length:4},()=>rand(2,5+diff*2));
      const ops=Array.from({length:3},()=>Math.random()<0.5?'+':'-');
      const r=calc(ns,ops);
      if(r>=0&&r<=30&&r!==ns[0]&&r!==ns[1]){
        return {type:'symbol',display:
          `<div class="symbol-line">
            <span class="known">${ns[0]}</span>
            <b class="op empty" data-i="0">＋</b>
            <span class="known">${ns[1]}</span>
            <b class="op empty" data-i="1">＋</b>
            <span class="known">${ns[2]}</span>
            <b class="op empty" data-i="2">＋</b>
            <span class="known">${ns[3]}</span>
            <span class="known" style="color:#6c5ce7">=</span>

  // 5. 图形算式：图形 emoji 大字号 42px

  // 6. 竖式方格：表格化对齐，5 列网格
  grid(diff=1){

  // 7. 破十加
  break10_add(diff=1){
    const ten=rand(2,5+diff),one=rand(3,9),add=rand(2,9-one+5);

      `<div style="font-size:26px;font-weight:bold;line-height:1.8">

  // 8. 破十减
  break10_sub(diff=1){

      <div class="break-row">

        <b class="box empty" data-i="2"></b>

  },

  boss(diff=5){
    const ts=['tree','shape','symbol','break10_add','break10_sub','grid'];

/* ============ AI 难度 ============ */
const AI={
  evaluate(){
    const s=Store.data.stats,d=Store.data.difficulty;
    if(s.total>=5){
      const acc=s.correct/s.total;
      if(acc>=0.9&&d.global<5)d.global++;
      else if(acc<0.5&&d.global>1)d.global--;
    }
    Object.keys(s.typeStats).forEach(t=>{
      const ts=s.typeStats[t];
      if(ts.total>=4){
        const a=ts.correct/ts.total;
        d.perType[t]=d.perType[t]||1;
        if(a>=0.85&&d.perType[t]<5)d.perType[t]++;
        else if(a<0.5&&d.perType[t]>1)d.perType[t]--;
      }
    });
    Store.save();
    return d;
  },
  getDiff(type){return Store.data.difficulty.perType[type]||Store.data.difficulty.global},
  suggest(){
    const s=Store.data.stats,d=Store.data.difficulty;
    const acc=s.total?(s.correct/s.total*100).toFixed(0):0;
    const tips=[];
    if(acc>=90)tips.push('🎉 太棒了！建议挑战更高难度');
    else if(acc>=70)tips.push('👍 保持当前难度，多练几种题型');
    else if(s.total>0)tips.push('💪 建议从基础关卡开始');
    const weak=Object.entries(s.typeStats).filter(([k,v])=>v.total>=3)
      .sort((a,b)=>a[1].correct/a[1].total-b[1].correct/b[1].total).slice(0,2)
      .map(([k])=>typeName(k));
    if(weak.length)tips.push('📌 重点练习：'+weak.join('、'));
    return {acc,level:d.global,tips};
  }
};

/* ============ 游戏引擎 ============ */
const Game={
  cur:null,curLvl:null,idx:0,total:5,start:0,timer:null,
  current:null,currentInput:[],currentBox:0,opMode:false,

  start(lvl){
    this.curLvl=lvl;this.idx=0;this.total=5;this.start=Date.now();
    this.cur={wrong:0,stars:0,cleared:false};
    Store.data.stats.times[lvl.type]=Store.data.stats.times[lvl.type]||[];
    this.timer=setInterval(()=>{
      document.getElementById('gTime').textContent=Math.floor((Date.now()-this.start)/1000);
    },200);
    document.getElementById('gTitle').textContent=lvl.name;
    this.next();App.go('game');
  },

  next(){
    if(this.idx>=this.total){this.finish();return}
    document.getElementById('gStar').textContent=this.cur.stars;
    const diff=AI.getDiff(this.curLvl.type);
    const q=Gen[this.curLvl.type](diff);
    this.current=q;this.opMode=!!q.op;
    q.boxMaxDigits=q.answer.map(a=>String(Math.abs(a)).length);
    this.currentInput=Array(q.answer.length).fill('');
    this.currentBox=0;
    this.render(q);
  },

  render(q){
    const body=document.getElementById('gBody');
    const diff=AI.getDiff(this.curLvl.type);
    body.innerHTML=`<div class="question">
      <div class="q-title">第 ${this.idx+1} / ${this.total} 题 · 难度 ${'⭐'.repeat(diff)}${'☆'.repeat(5-diff)}</div>
      <div class="q-main" id="qMain">${q.display}</div>
    </div>`;
    document.querySelectorAll('#qMain .box, #qMain .op').forEach((el,i)=>{
      el.addEventListener('click',()=>{this.currentBox=i;this.refreshInputs()});
    });
    this.refreshInputs();this.renderKeys();
  },

  refreshInputs(){
    const sel=this.opMode?'#qMain .op':'#qMain .box';
    const items=document.querySelectorAll(sel);
    items.forEach((el,i)=>{
      const v=this.currentInput[i]||'';
      el.textContent=v;el.classList.toggle('empty',!v);
      el.classList.toggle('filled',!!v);
      el.classList.toggle('active',i===this.currentBox);
    });
  },

  renderKeys(){
    const k=document.getElementById('gKeys');
    if(this.opMode){
      k.innerHTML=`
        <button class="key op" onclick="Game.inputOp('+')">+</button>
        <button class="key op" onclick="Game.inputOp('-')">−</button>
        <button class="key del" onclick="Game.del()">⌫</button>
        <button class="key ok" onclick="Game.ok()" style="grid-column:span 3">✅ 确认</button>`;
    }else{
      k.innerHTML=`
        <button class="key" onclick="Game.inputN(1)">1</button>
        <button class="key" onclick="Game.inputN(2)">2</button>
        <button class="key" onclick="Game.inputN(3)">3</button>
        <button class="key" onclick="Game.inputN(4)">4</button>
        <button class="key" onclick="Game.inputN(5)">5</button>
        <button class="key" onclick="Game.inputN(6)">6</button>
        <button class="key" onclick="Game.inputN(7)">7</button>
        <button class="key" onclick="Game.inputN(8)">8</button>
        <button class="key" onclick="Game.inputN(9)">9</button>
        <button class="key" onclick="Game.inputN(0)">0</button>
        <button class="key del" onclick="Game.del()">⌫</button>
        <button class="key ok" onclick="Game.ok()">✅</button>`;
    }
  },

  inputN(n){
    if(this.opMode)return;
    const max=(this.current.boxMaxDigits||[])[this.currentBox]||2;
    let s=this.currentInput[this.currentBox]||'';
    if(s.length>=max){
      if(this.currentBox+1<this.currentInput.length){
        this.currentBox++;s=String(n);
      }else return
    }else s+=String(n);
    this.currentInput[this.currentBox]=s;
    if(s.length>=max)this.currentBox=Math.min(this.currentBox+1,this.currentInput.length-1);
    this.refreshInputs();
  },

  inputOp(op){
    if(!this.opMode||this.currentBox>=this.currentInput.length)return;
    this.currentInput[this.currentBox]=op;
    this.currentBox=Math.min(this.currentBox+1,this.currentInput.length-1);
    this.refreshInputs();
  },

  del(){
    let s=this.currentInput[this.currentBox]||'';
    if(s.length>0){s=s.slice(0,-1);this.currentInput[this.currentBox]=s}
    else if(this.currentBox>0){
      this.currentBox--;
      s=this.currentInput[this.currentBox]||'';
      s=s.slice(0,-1);this.currentInput[this.currentBox]=s;
    }
    this.refreshInputs();
  },

  ok(){
    const sel=this.opMode?'#qMain .op':'#qMain .box';
    const items=document.querySelectorAll(sel);
    for(let i=0;i<this.currentInput.length;i++)if(!this.currentInput[i]){shake(sel);return}
    let correct=true;
    this.current.answer.forEach((a,i)=>{
      if(String(this.currentInput[i])!==String(a)){
        correct=false;
        if(items[i]){items[i].classList.add('wrong');setTimeout(()=>items[i]&&items[i].classList.remove('wrong'),600)}
      }
    });
    const t=Date.now()-this.start;
    this.record(correct,t);
    if(correct){beep(880,0.1);this.cur.stars++;document.getElementById('gStar').textContent=this.cur.stars;this.idx++;setTimeout(()=>this.next(),500)}
    else{beep(220,0.2);this.cur.wrong++;this.idx++;setTimeout(()=>this.next(),900)}
  },

  record(correct,time){
    const s=Store.data.stats;
    s.total++;if(correct)s.correct++;
    s.typeStats[this.curLvl.type]=s.typeStats[this.curLvl.type]||{correct:0,total:0,times:[]};
    s.typeStats[this.curLvl.type].total++;
    if(correct)s.typeStats[this.curLvl.type].correct++;
    s.typeStats[this.curLvl.type].times.push(time);
    if(s.typeStats[this.curLvl.type].times.length>20)s.typeStats[this.curLvl.type].times.shift();
    s.times[this.curLvl.type].push(time);
    if(s.times[this.curLvl.type].length>20)s.times[this.curLvl.type].shift();
    Store.data.history.push({date:new Date().toDateString(),type:this.curLvl.type,correct,time,diff:AI.getDiff(this.curLvl.type)});
    if(Store.data.history.length>200)Store.data.history.shift();
    Store.save();
  },

  finish(){
    clearInterval(this.timer);
    const t=Date.now()-this.start;
    const right=this.cur.stars;
    const stars=right>=5?3:right>=4?2:right>=3?1:0;
    const ai=AI.evaluate();
    const k='l'+this.curLvl.id;
    const lv=Store.data.levels[k]=Store.data.levels[k]||{stars:0,best:99999,cleared:false};
    lv.cleared=true;
    if(stars>lv.stars){Store.data.stars+=(stars-lv.stars);lv.stars=stars}
    if(t<lv.best)lv.best=t;
    if(right>=5)Store.data.level=Math.max(Store.data.level,this.curLvl.id);
    if(stars>=2)Store.data.stars+=this.curLvl.id;
    Store.save();
    const emoji=stars===3?'🏆':stars===2?'🎉':stars===1?'😊':'💪';
    const msgs=['继续加油！','不错哦！','很棒！','完美通关！'][stars]||'加油~';
    document.getElementById('modalCard').innerHTML=
      `<div class="emoji">${emoji}</div>
      <h3>${msgs}</h3>
      <div class="stars-big">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <p>用时 ${(t/1000).toFixed(1)} 秒<br>答对 ${right} / ${this.total} 题<br>
      <span class="difficulty-badge">AI 难度 ${'⭐'.repeat(ai.global)}${'☆'.repeat(5-ai.global)}</span></p>
      <div class="btn-row">
        <button class="alt" onclick="Game.replay()">🔁 再玩</button>
        <button class="main" onclick="App.go('worlds');document.getElementById('modal').classList.remove('on')">🗺️ 选关</button>
        <button class="home" onclick="App.go('home');document.getElementById('modal').classList.remove('on')">🏠 主页</button>
      </div>`;
    document.getElementById('modal').classList.add('on');
    if(stars===3)confettiBurst();
  },

  replay(){document.getElementById('modal').classList.remove('on');this.start(this.curLvl)},
  quit(){clearInterval(this.timer);document.getElementById('modal').classList.remove('on');App.go('home')}
};

function shake(sel){document.querySelectorAll(sel).forEach(b=>{b.style.animation='shake .4s';setTimeout(()=>b.style.animation='',400)})}
function beep(f,d){try{const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator(),g=a.createGain();o.frequency.value=f;g.gain.value=.08;o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+d)}catch(e){}}
function confettiBurst(){
  const colors=['#ff7675','#fdcb6e','#00b894','#74b9ff','#a29bfe','#fd79a8'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'%';c.style.top='-10px';
    c.style.background=colors[i%colors.length];
    c.style.animationDelay=Math.random()*0.5+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),2500);
  }
}

        <div style="font-size:12px;opacity:.9">天 · 今日 +5 ⭐</div>
      </div>
      <div class="calendar">
        <h3>${y} 年 ${m+1} 月</h3>
        <div class="weekdays">${['日','一','二','三','四','五','六'].map(d=>`<div>${d}</div>`).join('')}</div>
        ${[...Array(Math.ceil((first+days)/7))].map((_,wi)=>{
          const cells=[];
          for(let d=0;d<7;d++){
            const idx=wi*7+d-first+1;
            if(idx<1||idx>days){cells.push('<div class="day"></div>');continue}
            const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(idx).padStart(2,'0')}`;
            const isDone=Store.data.checkDays.includes(ds);
            const isToday=ds===todayStr;
            cells.push(`<div class="day ${isDone?'done':''} ${isToday?'today':''}">${idx}</div>`);
          }
          return `<div class="week">${cells.join('')}</div>`;
        }).join('')}
      </div>
      <div class="stat-card">
        <h3>📈 打卡统计</h3>
        <p>累计：<b>${Store.data.checkDays.length}</b> 天</p>
        <p>最长连续：<b>${Store.data.streak}</b> 天</p>
        <p>奖励：<b>${Store.data.checkDays.length*5}</b> ⭐</p>
      </div>`;
  },
  renderStats(){
    const s=Store.data.stats;
    const acc=s.total?(s.correct/s.total*100).toFixed(0):0;
    const types=Object.keys(s.typeStats);
    const d=Store.data.difficulty;
    document.getElementById('sBody').innerHTML=`
      <div class="stat-card">
        <h3>🎯 总体</h3>
        <p>答题 <b>${s.total}</b> · 答对 <b>${s.correct}</b></p>
        <p>正确率 <b style="color:#d63031">${acc}%</b></p>
        <div class="bar"><div class="bar-fill" style="width:${acc}%"></div></div>
        <p>等级 Lv.<b>${Store.data.level}</b> · ⭐ <b>${Store.data.stars}</b></p>
      </div>
      <div class="stat-card">
        <h3>📚 各题型</h3>
        ${types.length?types.map(t=>{
          const ts=s.typeStats[t],a=(ts.correct/ts.total*100).toFixed(0);
          const avg=ts.times.length?(ts.times.reduce((a,b)=>a+b,0)/ts.times.length/1000).toFixed(1):0;
          return `<p>${typeName(t)} <span class="difficulty-badge">Lv.${d.perType[t]||d.global}</span>
            <span style="float:right;font-size:12px">${ts.correct}/${ts.total} ${a}% ${avg}s</span></p>
            <div class="bar"><div class="bar-fill" style="width:${a}%"></div></div>`;
        }).join(''):'<p style="color:#999">暂无记录</p>'}
      </div>
      <div class="stat-card">
        <h3>🏆 通关记录</h3>
        ${WORLDS.flatMap(w=>w.levels).map(l=>{
          const lv=Store.data.levels['l'+l.id]||{stars:0,cleared:false};
          return `<p>${l.name} ${lv.cleared?'✅':'⬜'} ${'⭐'.repeat(lv.stars)}${'☆'.repeat(3-lv.stars)}</p>`;
        }).join('')}
      </div>`;
  },
  renderAI(){
    const sg=AI.suggest(),d=Store.data.difficulty;
    document.getElementById('aBody').innerHTML=`
      <div class="stat-card" style="background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff">
        <h3 style="color:#fff">🧠 AI 评估</h3>
        <p>正确率 <b>${sg.acc}%</b></p>
        <p>推荐 ${'⭐'.repeat(sg.level)}${'☆'.repeat(5-sg.level)}</p>
      </div>
      <div class="stat-card">
        <h3>📊 题型难度</h3>
        ${Object.keys(d.perType).length?Object.entries(d.perType).map(([t,l])=>{
          const ts=Store.data.stats.typeStats[t]||{correct:0,total:0};
          const a=ts.total?(ts.correct/ts.total*100).toFixed(0):0;
          return `<p>${typeName(t)} <span class="difficulty-badge">Lv.${l}</span>
            <span style="float:right">${a}%</span></p>
            <div class="bar"><div class="bar-fill" style="width:${a}%"></div></div>`;
        }).join(''):'<p style="color:#999">玩几关后 AI 智能调档</p>'}
      </div>
      <div class="stat-card">
        <h3>💡 建议</h3>
        ${sg.tips.map(t=>`<p>${t}</p>`).join('')||'<p>开始闯关获取建议</p>'}
      </div>
      <div class="stat-card">
        <h3>⚙️ 手动</h3>
        <button class="difficulty-badge" onclick="Store.data.difficulty.global=Math.max(1,Store.data.difficulty.global-1);Store.save();App.renderAI()">➖ 降档</button>
        <button class="difficulty-badge" onclick="Store.data.difficulty.global=Math.min(5,Store.data.difficulty.global+1);Store.save();App.renderAI()">➕ 升档</button>
        <button class="difficulty-badge" style="background:#d63031" onclick="if(confirm('重置所有数据？')){localStorage.clear();location.reload()}">🗑 重置</button>
      </div>`;
  }
};

App.go('home');
</script>
</body>
</html>
